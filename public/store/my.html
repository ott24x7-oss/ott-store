<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Account — OTT Store</title>
<link rel="stylesheet" href="/style.css">
<style>
/* ── Portal layout ── */
.portal-wrap { display: flex; flex-direction: column; min-height: 100vh; }

/* Header */
.portal-header {
  background: var(--header-bg); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border); padding: .7rem 1rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100; gap: .5rem;
}
.portal-logo { font-size: 1.1rem; font-weight: 800; color: var(--text); flex-shrink: 0; }
.portal-header-right { display: flex; align-items: center; gap: .6rem; flex-shrink: 0; }
.wallet-pill {
  display: flex; align-items: center; gap: .4rem;
  background: linear-gradient(135deg, rgba(99,102,241,.12), rgba(139,92,246,.12));
  border: 1px solid rgba(99,102,241,.25); border-radius: 20px;
  padding: .3rem .8rem; font-size: .85rem; font-weight: 700; cursor: pointer;
}
.wallet-pill:hover { background: rgba(99,102,241,.18); }
.avatar-chip {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--grad-1), var(--grad-2));
  color: #fff; font-weight: 800; font-size: .85rem;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
}
.btn-icon-hdr { background: none; border: none; font-size: 1.15rem; cursor: pointer; padding: .2rem; color: var(--muted); }
.btn-icon-hdr:hover { color: var(--text); }

/* Tabs nav (desktop) */
.tab-nav {
  display: flex; background: var(--card); border-bottom: 1px solid var(--border);
  overflow-x: auto; scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: none; padding: .75rem 1.25rem; font-size: .875rem; font-weight: 600;
  color: var(--muted); background: none; border: none; border-bottom: 2.5px solid transparent;
  cursor: pointer; white-space: nowrap; transition: all .15s;
}
.tab-btn.active { color: var(--grad-1); border-bottom-color: var(--grad-1); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* Main content */
.portal-main { flex: 1; padding: 1.5rem 1rem; max-width: 1100px; margin: 0 auto; width: 100%; }

/* Bottom nav (mobile) */
.bottom-nav {
  display: none; position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
  background: var(--card); border: 1px solid var(--border); border-radius: 30px;
  box-shadow: var(--shadow-lg); padding: .4rem .6rem;
  z-index: 200; gap: .2rem;
}
.bnav-btn {
  display: flex; flex-direction: column; align-items: center; gap: .1rem;
  padding: .45rem .75rem; border-radius: 24px; border: none; background: none;
  color: var(--muted); font-size: .65rem; font-weight: 600; cursor: pointer;
  transition: all .15s;
}
.bnav-btn .bnav-icon { font-size: 1.2rem; }
.bnav-btn.active { background: linear-gradient(135deg,var(--grad-1),var(--grad-2)); color: #fff; }

/* Drawer */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 300; display: none; }
.drawer-overlay.open { display: block; }
.drawer {
  position: fixed; right: 0; top: 0; bottom: 0; width: min(320px, 85vw);
  background: var(--card); border-left: 1px solid var(--border);
  z-index: 301; padding: 1.5rem 1rem;
  transform: translateX(100%); transition: transform .22s ease;
  display: flex; flex-direction: column; gap: .5rem; overflow-y: auto;
}
.drawer.open { transform: translateX(0); }
.drawer-tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: .5rem; }
.drawer-tab-btn {
  display: flex; flex-direction: column; align-items: center; gap: .3rem;
  padding: .75rem .5rem; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
  background: var(--card); cursor: pointer; font-size: .75rem; font-weight: 600; color: var(--text);
}
.drawer-tab-btn:hover { border-color: var(--grad-1); color: var(--grad-1); }
.drawer-tab-btn .dt-icon { font-size: 1.3rem; }
.drawer-theme-row {
  margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

/* Auth forms */
.auth-wrap { max-width: 420px; margin: 2rem auto; }
.auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
.auth-tab {
  flex: 1; padding: .7rem; text-align: center; font-weight: 700; font-size: .9rem;
  cursor: pointer; color: var(--muted); border-bottom: 2.5px solid transparent;
}
.auth-tab.active { color: var(--grad-1); border-bottom-color: var(--grad-1); }

/* Stat cards */
.stat-cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.5rem; }
.stat-card { text-align: center; }
.stat-icon { font-size: 1.4rem; margin-bottom: .2rem; }
.stat-label { font-size: .75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.stat-value { font-size: 1.6rem; font-weight: 800; }

/* Quick actions */
.quick-actions { display: grid; grid-template-columns: repeat(4,1fr); gap: .75rem; margin-bottom: 1.5rem; }
.qa-tile {
  display: flex; flex-direction: column; align-items: center; gap: .4rem;
  padding: 1rem .5rem; background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all .15s; text-align: center;
}
.qa-tile:hover { border-color: var(--grad-1); transform: translateY(-2px); }
.qa-icon { font-size: 1.6rem; }
.qa-label { font-size: .8rem; font-weight: 600; color: var(--muted); }

/* Plan cards in portal */
.portal-plans-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
.portal-platform-chips { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1rem; }

/* Orders */
.order-item {
  display: flex; align-items: center; gap: 1rem;
  padding: .9rem; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: .6rem;
}
.order-platform-icon { font-size: 1.8rem; flex-shrink: 0; }
.order-info { flex: 1; min-width: 0; }
.order-name { font-weight: 600; font-size: .9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.order-meta { font-size: .78rem; color: var(--muted); }
.order-right { display: flex; flex-direction: column; align-items: flex-end; gap: .3rem; flex-shrink: 0; }
.order-amount { font-weight: 700; font-size: .9rem; }

/* Wallet */
.wallet-balance-card {
  background: linear-gradient(135deg, var(--grad-1), var(--grad-2));
  border-radius: var(--radius); padding: 1.75rem; color: #fff; margin-bottom: 1.5rem;
  position: relative; overflow: hidden;
}
.wallet-balance-card::after {
  content: '₹'; position: absolute; right: -10px; top: -20px;
  font-size: 7rem; opacity: .08; font-weight: 900;
}
.wb-label { font-size: .85rem; opacity: .85; margin-bottom: .3rem; }
.wb-amount { font-size: 2.5rem; font-weight: 900; }
.topup-methods { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
.topup-method {
  padding: 1.25rem; background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all .15s; text-align: center;
}
.topup-method:hover, .topup-method.active { border-color: var(--grad-1); }
.topup-icon { font-size: 1.8rem; margin-bottom: .4rem; }
.topup-name { font-weight: 700; font-size: .9rem; }
.topup-sub { font-size: .78rem; color: var(--muted); }

/* Txn history */
.txn-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: .75rem .9rem; border-bottom: 1px solid var(--border); font-size: .875rem;
}
.txn-item:last-child { border-bottom: none; }
.txn-plus { color: var(--green); font-weight: 700; }
.txn-minus { color: var(--red); font-weight: 700; }

/* Credentials modal */
.creds-box {
  background: var(--input-bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 1rem; display: flex; flex-direction: column; gap: .6rem;
}
.cred-row { display: flex; justify-content: space-between; align-items: center; gap: .5rem; }
.cred-label { font-size: .8rem; color: var(--muted); font-weight: 600; text-transform: uppercase; }
.cred-value { font-weight: 600; font-size: .9rem; font-family: monospace; flex: 1; word-break: break-all; }
.copy-btn { font-size: .75rem; padding: .2rem .5rem; }

/* Support */
.ticket-item {
  padding: .9rem 1rem; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: .6rem; cursor: pointer;
  transition: border-color .15s;
}
.ticket-item:hover { border-color: var(--grad-1); }
.ticket-subject { font-weight: 600; font-size: .9rem; margin-bottom: .25rem; }
.ticket-meta { font-size: .78rem; color: var(--muted); }

.ticket-thread { display: flex; flex-direction: column; gap: .75rem; margin-bottom: 1rem; }
.thread-msg {
  padding: .75rem 1rem; border-radius: var(--radius-sm); max-width: 85%;
  font-size: .875rem; line-height: 1.5;
}
.thread-msg.customer {
  background: linear-gradient(135deg, rgba(99,102,241,.12), rgba(139,92,246,.12));
  border: 1px solid rgba(99,102,241,.2); align-self: flex-end;
}
.thread-msg.admin {
  background: var(--card); border: 1px solid var(--border); align-self: flex-start;
}
.thread-msg .msg-sender { font-size: .73rem; font-weight: 700; color: var(--muted); margin-bottom: .2rem; }

/* Expiry alert */
.expiry-alert {
  background: var(--yellow-bg); border: 1px solid var(--yellow);
  border-radius: var(--radius-sm); padding: .75rem 1rem; margin-bottom: 1rem;
  font-size: .875rem; color: var(--yellow);
}

/* Announcement */
.announcement {
  background: linear-gradient(135deg, rgba(99,102,241,.08), rgba(139,92,246,.08));
  border: 1px solid rgba(99,102,241,.2); border-radius: var(--radius-sm);
  padding: .75rem 1rem; margin-bottom: 1rem; font-size: .875rem;
}

@media (max-width: 760px) {
  .tab-nav { display: none; }
  .bottom-nav { display: flex; }
  .stat-cards { grid-template-columns: repeat(3,1fr); gap: .6rem; }
  .stat-value { font-size: 1.2rem; }
  .quick-actions { grid-template-columns: repeat(2,1fr); }
  .portal-plans-grid { grid-template-columns: repeat(2,1fr); }
  .topup-methods { grid-template-columns: 1fr; }
  .portal-main { padding: 1rem .75rem 6rem; }
}
@media (max-width: 480px) {
  .portal-plans-grid { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>
<script>
(function(){
  var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

<div class="portal-wrap">
<!-- Header -->
<header class="portal-header">
  <a href="/" class="portal-logo" id="portal-logo">OTT Store</a>
  <div class="portal-header-right">
    <div class="wallet-pill hide-mobile" id="hdr-wallet" style="display:none">
      <span>💰</span><span id="hdr-wallet-val">₹0</span>
    </div>
    <button class="btn-icon-hdr" id="theme-toggle-hdr" title="Toggle theme">🌙</button>
    <div class="avatar-chip hide-mobile" id="hdr-avatar" style="display:none">?</div>
    <button class="btn-icon-hdr" id="hamburger-btn" style="display:none;font-size:1.4rem">☰</button>
  </div>
</header>

<!-- Tab nav -->
<nav class="tab-nav" id="tab-nav"></nav>

<!-- Content -->
<main class="portal-main" id="portal-main"></main>
</div>

<!-- Bottom nav -->
<div class="bottom-nav" id="bottom-nav">
  <button class="bnav-btn" data-tab="dashboard"><span class="bnav-icon">🏠</span>Home</button>
  <button class="bnav-btn" data-tab="plans"><span class="bnav-icon">🎬</span>Plans</button>
  <button class="bnav-btn" data-tab="orders"><span class="bnav-icon">📦</span>Orders</button>
  <button class="bnav-btn" data-tab="wallet"><span class="bnav-icon">💰</span>Wallet</button>
  <button class="bnav-btn" data-tab="__more"><span class="bnav-icon">⋯</span>More</button>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<div class="drawer" id="side-drawer">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
    <span style="font-weight:800;font-size:1rem">Menu</span>
    <button class="btn-icon" id="close-drawer">✕</button>
  </div>
  <div class="drawer-tabs" id="drawer-tabs"></div>
  <div class="drawer-theme-row">
    <span style="font-size:.875rem;font-weight:600">Dark Mode</span>
    <button class="btn btn-secondary btn-sm" id="theme-toggle-drawer">🌙 Toggle</button>
  </div>
</div>

<script>
(function(){
'use strict';

// ── State ─────────────────────────────────────────────────────────────────
let CUSTOMER = null, STORE = {}, ACTIVE_TAB = 'dashboard';
let ALL_PLANS = [], ORDERS = [], TXNS = [], TICKETS = [];
const PLATFORM_ICONS = {
  'Netflix':'🎬','Amazon Prime':'📦','Disney+':'🏰','Sony LIV':'📺',
  'Zee5':'🎭','Hotstar':'🌟','JioCinema':'🎥','MX Player':'▶️',
  'Apple TV+':'🍎','Voot':'📱',
};
const TABS = [
  { id:'dashboard', label:'Dashboard', icon:'🏠' },
  { id:'plans',     label:'Plans',     icon:'🎬' },
  { id:'orders',    label:'Orders',    icon:'📦' },
  { id:'wallet',    label:'Wallet',    icon:'💰' },
  { id:'support',   label:'Support',   icon:'🎧' },
  { id:'profile',   label:'Profile',   icon:'👤' },
];

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ return '₹' + Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(s){ if(!s) return '—'; try{ return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); } catch{ return s; } }
function statusBadge(s){
  const map={pending:'badge-yellow',processing:'badge-blue',delivered:'badge-green',expired:'badge-grey',cancelled:'badge-red',open:'badge-blue',closed:'badge-grey',approved:'badge-green',rejected:'badge-red'};
  return `<span class="badge ${map[s]||'badge-grey'}">${s||''}</span>`;
}
async function api(path, opts={}){
  const r = await fetch('/user/api'+path, {credentials:'include',headers:{'Content-Type':'application/json'},...opts});
  const j = await r.json();
  if(!r.ok) throw new Error(j.error||'Request failed');
  return j;
}
function showToast(msg, type='success'){
  const t = document.createElement('div');
  t.className = `alert alert-${type}`;
  Object.assign(t.style,{position:'fixed',bottom:'5rem',left:'50%',transform:'translateX(-50%)',zIndex:9999,whiteSpace:'nowrap',minWidth:'200px',textAlign:'center',boxShadow:'var(--shadow-lg)'});
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
}
function openModal(html){
  const ov = document.createElement('div');
  ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.querySelector('.modal').addEventListener('click',e=>e.stopPropagation());
  ov.addEventListener('click',()=>ov.remove());
  document.body.appendChild(ov);
  ov.querySelector('[data-close]')?.addEventListener('click',()=>ov.remove());
  return ov;
}

// ── Theme ─────────────────────────────────────────────────────────────────
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  ['theme-toggle-hdr','theme-toggle-drawer'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.textContent = t==='dark'?'☀️ Light':'🌙 Dark';
  });
}
function toggleTheme(){
  const next = document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  localStorage.setItem('theme',next); applyTheme(next);
}
document.getElementById('theme-toggle-hdr').addEventListener('click',toggleTheme);
document.getElementById('theme-toggle-drawer').addEventListener('click',toggleTheme);
applyTheme(document.documentElement.getAttribute('data-theme')||'light');

// ── Navigation ────────────────────────────────────────────────────────────
function buildNav(){
  const nav = document.getElementById('tab-nav');
  nav.innerHTML = TABS.map(t=>`<button class="tab-btn${ACTIVE_TAB===t.id?' active':''}" data-tab="${t.id}">${t.icon} ${t.label}</button>`).join('');
  nav.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>goTab(b.dataset.tab)));

  const bn = document.getElementById('bottom-nav');
  bn.querySelectorAll('.bnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===ACTIVE_TAB));

  const dt = document.getElementById('drawer-tabs');
  dt.innerHTML = TABS.map(t=>`<button class="drawer-tab-btn" data-tab="${t.id}"><span class="dt-icon">${t.icon}</span>${t.label}</button>`).join('');
  dt.querySelectorAll('.drawer-tab-btn').forEach(b=>b.addEventListener('click',()=>{closeDrawer();goTab(b.dataset.tab);}));
}

function goTab(id){
  ACTIVE_TAB=id; buildNav();
  const handlers={
    dashboard: renderDashboard, plans: renderPlans, orders: renderOrders,
    wallet: renderWallet, support: renderSupport, profile: renderProfile,
  };
  (handlers[id]||renderDashboard)();
}

// ── Drawer ────────────────────────────────────────────────────────────────
document.getElementById('hamburger-btn').addEventListener('click',openDrawer);
document.getElementById('drawer-overlay').addEventListener('click',closeDrawer);
document.getElementById('close-drawer').addEventListener('click',closeDrawer);
function openDrawer(){ document.getElementById('side-drawer').classList.add('open'); document.getElementById('drawer-overlay').classList.add('open'); }
function closeDrawer(){ document.getElementById('side-drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }

document.getElementById('bottom-nav').addEventListener('click',e=>{
  const btn=e.target.closest('.bnav-btn'); if(!btn) return;
  if(btn.dataset.tab==='__more'){ openDrawer(); return; }
  goTab(btn.dataset.tab);
});

// ── Auth flow ─────────────────────────────────────────────────────────────
function renderAuth(tab='login'){
  const main=document.getElementById('portal-main');
  main.innerHTML=`
<div class="auth-wrap">
  <div class="card">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2rem;margin-bottom:.5rem">🎬</div>
      <h2 style="font-size:1.3rem;font-weight:800">Welcome to <span id="auth-store-name">OTT Store</span></h2>
      <p class="muted">Login or create account to continue</p>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab${tab==='login'?' active':''}" id="at-login" onclick="authTab('login')">Login</div>
      <div class="auth-tab${tab==='register'?' active':''}" id="at-reg" onclick="authTab('register')">Sign Up</div>
    </div>
    <div id="auth-body"></div>
  </div>
  <p class="muted text-center mt-3"><a href="/">← Back to store</a></p>
</div>`;
  authTab(tab);
}

window.authTab=function(t){
  document.getElementById('at-login')?.classList.toggle('active',t==='login');
  document.getElementById('at-reg')?.classList.toggle('active',t==='register');
  const body=document.getElementById('auth-body');
  if(t==='login'){
    body.innerHTML=`
<form id="login-form" style="display:flex;flex-direction:column;gap:.9rem">
  <div id="login-err"></div>
  <div class="form-group"><label class="form-label">Email</label><input class="form-input" name="email" type="email" required placeholder="you@example.com"></div>
  <div class="form-group"><label class="form-label">Password</label><input class="form-input" name="password" type="password" required placeholder="••••••••"></div>
  <button type="submit" class="btn btn-primary btn-block">Login</button>
  <p class="muted text-center" style="font-size:.8rem"><span style="cursor:pointer;color:var(--blue)" onclick="showForgot()">Forgot password?</span></p>
</form>`;
    document.getElementById('login-form').onsubmit=async e=>{
      e.preventDefault();
      const fd=new FormData(e.target);
      const err=document.getElementById('login-err');
      try{
        const r=await api('/login',{method:'POST',body:JSON.stringify({email:fd.get('email'),password:fd.get('password')})});
        await initPortal();
      }catch(ex){ err.innerHTML=`<div class="alert alert-error">${esc(ex.message)}</div>`; }
    };
  } else {
    body.innerHTML=`
<form id="reg-form" style="display:flex;flex-direction:column;gap:.9rem">
  <div id="reg-err"></div>
  <div class="form-group"><label class="form-label">Full Name</label><input class="form-input" name="name" required placeholder="Raj Kumar"></div>
  <div class="form-group"><label class="form-label">Email</label><input class="form-input" name="email" type="email" required placeholder="you@example.com"></div>
  <div class="form-group"><label class="form-label">Password</label><input class="form-input" name="password" type="password" required placeholder="Min. 6 characters"></div>
  <div class="form-group"><label class="form-label">Phone (optional)</label><input class="form-input" name="phone" type="tel" placeholder="+91 9876543210"></div>
  <button type="submit" class="btn btn-primary btn-block">Create Account</button>
</form>`;
    document.getElementById('reg-form').onsubmit=async e=>{
      e.preventDefault();
      const fd=new FormData(e.target);
      const err=document.getElementById('reg-err');
      try{
        await api('/register',{method:'POST',body:JSON.stringify({name:fd.get('name'),email:fd.get('email'),password:fd.get('password'),phone:fd.get('phone')||undefined})});
        await initPortal();
      }catch(ex){ err.innerHTML=`<div class="alert alert-error">${esc(ex.message)}</div>`; }
    };
  }
};

window.showForgot=function(){
  const body=document.getElementById('auth-body');
  body.innerHTML=`
<form id="forgot-form" style="display:flex;flex-direction:column;gap:.9rem">
  <div id="forgot-err"></div>
  <p class="muted" style="font-size:.875rem">Enter your email to receive a password reset link.</p>
  <div class="form-group"><label class="form-label">Email</label><input class="form-input" name="email" type="email" required></div>
  <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
  <button type="button" class="btn btn-secondary btn-block" onclick="authTab('login')">Back to Login</button>
</form>`;
  document.getElementById('forgot-form').onsubmit=async e=>{

function confirmBuy(planId, planName, price){
  const balance=Number(CUSTOMER?.wallet_inr||0);
  const cost=Number(price);
  const enough=balance>=cost;
  const ov=openModal(`
<div class="modal-header"><h3>Confirm Purchase</h3><button class="btn-icon" data-close>✕</button></div>
<div class="modal-body">
  ${!enough?`<div class="alert alert-warn">⚠️ Insufficient balance. You need ${fmt(cost)}, you have ${fmt(balance)}. <span style="color:var(--blue);cursor:pointer" onclick="closeModalAndGo()">Top up wallet →</span></div>`:''}
  <div style="background:var(--input-bg);border-radius:var(--radius-sm);padding:1rem">
    <div style="font-size:.8rem;color:var(--muted)">Plan</div>
    <div style="font-weight:700">${esc(planName)}</div>
    <div style="font-size:1.3rem;font-weight:800;margin-top:.5rem" class="grad-text">${fmt(cost)}</div>
  </div>
  <p style="font-size:.8rem;color:var(--muted)">Amount will be deducted from your wallet balance.</p>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" data-close>Cancel</button>
  <button class="btn btn-primary" id="confirm-buy-btn" ${!enough?'disabled':''}>Confirm Purchase</button>
</div>`);
  window.closeModalAndGo=()=>{ ov.remove(); goTab('wallet'); };
  document.getElementById('confirm-buy-btn')?.addEventListener('click',async()=>{
    const btn=document.getElementById('confirm-buy-btn');
    btn.disabled=true; btn.textContent='Processing...';
    try{
      const r=await api('/orders',{method:'POST',body:JSON.stringify({plan_id:Number(planId)})});
      ov.remove();
      // refresh wallet
      const me=await api('/me');
      CUSTOMER=me; updateHeaderUI();
      showToast('Order placed! Check Orders tab.','success');
      goTab('orders');
    }catch(e){ btn.disabled=false; btn.textContent='Confirm Purchase'; showToast(e.message,'error'); }
  });
}

function badgeClass(b){
  const l=(b||'').toLowerCase();
  if(l.includes('popular')) return 'badge-popular';
  if(l.includes('best')||l.includes('value')) return 'badge-best';
  return 'badge-new';
}

window.initiateRazorpay=async function(){
  const amt=Number(document.getElementById('rz-amount')?.value||0);
  if(amt<1) return showToast('Enter valid amount','error');
  try{
    const r=await api('/topup/razorpay',{method:'POST',body:JSON.stringify({amount:amt})});
    const options={
      key:r.key, amount:r.amount, currency:'INR', name:STORE.site_name||'OTT Store',
      description:'Wallet Top Up',
      order_id:r.order_id,
      handler:async function(resp){
        try{
          await api('/topup/razorpay/verify',{method:'POST',body:JSON.stringify(resp)});
          showToast('Wallet topped up!','success');
          renderWallet();
        }catch(e){ showToast(e.message,'error'); }
      },
      theme:{color:'#6366f1'},
    };
    new Razorpay(options).open();
  }catch(e){ showToast(e.message,'error'); }
};

  const upiId=STORE.upi_id||''; const upiName=STORE.upi_name||'Store';

  document.getElementById('upi-form').onsubmit=async e=>{

    document.getElementById('profile-form').onsubmit=async e=>{
      e.preventDefault();
      const fd=new FormData(e.target);
      const msg=document.getElementById('pf-msg');
      const body={name:fd.get('name'),email:fd.get('email'),phone:fd.get('phone')};
      if(fd.get('password')) { body.password=fd.get('password'); body.current_password=fd.get('current_password'); }
      try{
        await api('/me',{method:'PUT',body:JSON.stringify(body)});
        CUSTOMER=await api('/me'); updateHeaderUI();
        msg.innerHTML='<div class="alert alert-success">Saved!</div>';
        setTimeout(()=>msg.innerHTML='',2000);
      }catch(ex){ msg.innerHTML=`<div class="alert alert-error">${esc(ex.message)}</div>`; }
    };
  }catch(e){ main.innerHTML=`<div class="alert alert-error">${esc(e.message)}</div>`; }
}

window.logout=async function(){
  await fetch('/user/api/logout',{method:'POST',credentials:'include'});
  CUSTOMER=null;
  document.getElementById('hdr-avatar').style.display='none';
  document.getElementById('hdr-wallet').style.display='none';
  document.getElementById('tab-nav').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  renderAuth();
};

// ── Boot ──────────────────────────────────────────────────────────────────
initPortal();

})();

<!-- Razorpay SDK loaded on demand -->
<script>
window.addEventListener('message', function(e) {
  if (e.data === 'load-razorpay' && !document.getElementById('rzp-sdk')) {
    var s = document.createElement('script');
    s.id = 'rzp-sdk';
    s.src = 'https://checkout.razorpay.com/v1/checkout.js';
    document.head.appendChild(s);
  }
});
// Auto-load if Razorpay is configured
fetch('/user/api/store').then(r=>r.json()).then(s=>{
  if (s.razorpay_enabled === '1' && s.razorpay_key) {
    var sc = document.createElement('script');
    sc.id = 'rzp-sdk';
    sc.src = 'https://checkout.razorpay.com/v1/checkout.js';
    document.head.appendChild(sc);
  }
});
</script>
