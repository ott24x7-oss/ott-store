<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title id="my-title">My Account — OTT Store</title>
<link rel="stylesheet" href="/store/store-theme.css">
<link rel="stylesheet" href="/store/themes.css">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#05050b">
<link rel="icon" type="image/png" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<style>
/* ── Layout ── */
.my-wrap{display:flex;flex-direction:column;min-height:100vh}
.my-main{flex:1;padding:1.5rem 1rem;max-width:1100px;margin:0 auto;width:100%}
.my-main-auth{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}

/* ── Header ── */
.my-nav{position:sticky;top:0;z-index:200;background:var(--header-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:.8rem 1.5rem}
.my-nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:.75rem}
.my-logo{font-size:1.25rem;font-weight:900;background:linear-gradient(135deg,var(--red),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none;flex-shrink:0;display:flex;align-items:center}
.my-logo:hover{opacity:.85;text-decoration:none}
.my-logo img{max-height:36px;max-width:160px;object-fit:contain;display:block}
html .my-logo .logo-light{display:block}
html .my-logo .logo-dark{display:none}
html[data-theme="dark"] .my-logo .logo-light{display:none}
html[data-theme="dark"] .my-logo .logo-dark{display:block}
.my-nav-links{display:flex;gap:.25rem;align-items:center}
.my-nav-links a{color:var(--muted);font-size:.875rem;font-weight:600;padding:.3rem .65rem;border-radius:7px;text-decoration:none;transition:all .15s}
.my-nav-links a:hover{color:var(--text);background:rgba(255,43,79,.08);text-decoration:none}
.my-nav-right{display:flex;align-items:center;gap:.5rem;margin-left:auto}
.my-wallet-pill{display:flex;align-items:center;gap:.35rem;background:linear-gradient(135deg,rgba(255,43,79,.1),rgba(255,138,0,.1));border:1px solid rgba(255,43,79,.2);border-radius:20px;padding:.3rem .75rem;font-size:.82rem;font-weight:700;cursor:pointer;text-decoration:none;color:var(--text)}
.my-wallet-pill:hover{background:rgba(255,43,79,.15);text-decoration:none}
.my-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--grad-1),var(--grad-2));color:#fff;font-weight:800;font-size:.8rem;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.my-btn-icon{background:none;border:none;font-size:1.1rem;cursor:pointer;padding:.2rem .3rem;color:var(--muted);border-radius:6px}
.my-btn-icon:hover{color:var(--text);background:rgba(255,43,79,.08)}

/* ── Tab nav ── */
.my-tab-nav{display:flex;justify-content:center;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;padding:0 .5rem}
.my-tab-nav::-webkit-scrollbar{display:none}
.my-tab-btn{flex:none;padding:.7rem 1.2rem;font-size:.875rem;font-weight:600;color:var(--muted);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s}
.my-tab-btn.active{color:var(--grad-1);border-bottom-color:var(--grad-1)}
.my-tab-btn:hover:not(.active){color:var(--text)}

/* ── Bottom nav ── */
.my-bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;z-index:200;background:rgba(5,5,11,.96);border-top:1px solid rgba(255,255,255,.1);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);grid-template-columns:repeat(5,1fr)}
.my-bnav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.1rem;padding:.3rem .5rem;border:none;background:none;color:rgba(255,255,255,.42);font-size:.6rem;font-weight:600;cursor:pointer;transition:all .15s;text-align:center}
.my-bnav-btn .bi{font-size:1.2rem;line-height:1;display:block;margin-bottom:.05rem}
.my-bnav-btn.active{color:#fff}
.my-bnav-btn.active .bi{filter:drop-shadow(0 0 6px rgba(255,43,79,.8))}

/* ── Drawer ── */
.my-drawer-ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none}
.my-drawer-ov.open{display:block}
.my-drawer{position:fixed;right:0;top:0;bottom:0;width:min(300px,85vw);background:#0d0f1a;border-left:1px solid rgba(255,255,255,.1);z-index:301;padding:1.25rem 1rem;transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column;gap:.5rem;overflow-y:auto}
.my-drawer.open{transform:translateX(0)}
.my-drawer-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem}
.my-dtab{display:flex;flex-direction:column;align-items:center;gap:.3rem;padding:.7rem .4rem;border-radius:10px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:.73rem;font-weight:600;color:var(--text)}
.my-dtab:hover{border-color:var(--grad-1);color:var(--grad-1)}
.my-dtab .di{font-size:1.25rem}

/* ── Auth bottom nav (shown only on login/register page) ── */
.my-auth-bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:58px;z-index:200;background:rgba(5,5,11,.96);border-top:1px solid rgba(255,255,255,.1);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);grid-template-columns:repeat(4,1fr)}
.my-auth-bnav a{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.1rem;padding:.3rem .5rem;color:rgba(255,255,255,.42);font-size:.6rem;font-weight:600;text-decoration:none;transition:color .15s;text-align:center}
.my-auth-bnav a:hover{color:#fff;text-decoration:none}
.my-auth-bnav a.active{color:#fff}
.my-auth-bnav a span{font-size:1.2rem;line-height:1;display:block;margin-bottom:.05rem}
@media(max-width:760px){.my-auth-bnav{display:grid}.my-main-auth{padding:.5rem 1rem 5rem}}

/* ── Footer ── */
.my-footer{border-top:1px solid var(--border);padding:2rem 1.25rem;background:var(--card);margin-top:auto}
.my-footer-inner{max-width:1200px;margin:0 auto;display:flex;flex-wrap:wrap;gap:1rem;align-items:center;justify-content:space-between}
.my-footer-links{display:flex;flex-wrap:wrap;gap:1rem}
.my-footer-links a{color:var(--muted);font-size:.8rem;font-weight:600;text-decoration:none;transition:color .15s}
.my-footer-links a:hover{color:var(--text);text-decoration:none}
.my-footer-copy{font-size:.8rem;color:var(--muted)}

/* ── Auth wrapper ── */
.my-auth-box{width:100%;max-width:440px}
.my-auth-card{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.12);border-radius:20px;padding:2rem;box-shadow:var(--shadow-lg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.my-auth-logo{text-align:center;margin-bottom:1.75rem}
.my-auth-logo .al-icon{font-size:2.5rem;margin-bottom:.5rem}
.my-auth-logo h1{font-size:1.4rem;font-weight:800;margin-bottom:.25rem}
.my-auth-logo p{font-size:.875rem;color:var(--muted)}

/* Method selector pills */
.my-auth-methods{display:flex;gap:.4rem;background:var(--input-bg);border-radius:12px;padding:.3rem;margin-bottom:1.5rem}
.mam-btn{flex:1;padding:.45rem .35rem;border:none;border-radius:8px;background:none;font-size:.75rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s;white-space:nowrap;text-align:center}
.mam-btn.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.12)}

/* WA 1-tap button */
.my-wa-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;border:none;border-radius:12px;padding:.85rem 1rem;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(37,211,102,.35);margin-bottom:1rem}
.my-wa-btn:hover{opacity:.9;transform:translateY(-1px)}
.my-tg-btn{display:flex;align-items:center;justify-content:center;gap:.6rem;width:100%;background:linear-gradient(135deg,#2aabee,#229ed9);color:#fff;border:none;border-radius:12px;padding:.85rem 1rem;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(34,158,217,.38);margin-bottom:1rem}
.my-tg-btn:hover{opacity:.92;transform:translateY(-1px)}

/* Or divider */
.my-or{display:flex;align-items:center;gap:.75rem;color:var(--muted);font-size:.8rem;font-weight:600;margin:.9rem 0}
.my-or::before,.my-or::after{content:'';flex:1;height:1px;background:var(--border)}

/* Steps for OTP */
.my-otp-step{display:flex;flex-direction:column;gap:.9rem}
.my-otp-step.hidden{display:none}
.my-otp-input{display:flex;gap:.5rem}
.my-otp-input input{flex:1;text-align:center;letter-spacing:.25rem;font-size:1.2rem;font-weight:700;font-family:monospace}
.my-resend{font-size:.8rem;color:var(--muted);text-align:center;margin-top:.25rem}
.my-resend span{color:var(--blue);cursor:pointer;font-weight:600}
.my-resend span:hover{text-decoration:underline}

/* Auth form basics */
.my-form{display:flex;flex-direction:column;gap:.8rem}
.my-lbl{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.25rem;display:block}
.my-err{font-size:.82rem;color:var(--red);background:var(--red-bg);border:1px solid var(--red);border-radius:8px;padding:.5rem .75rem}
.my-ok{font-size:.82rem;color:var(--green);background:var(--green-bg);border:1px solid var(--green);border-radius:8px;padding:.5rem .75rem}

/* ── Dashboard Hero ── */
.dash-hero{background:linear-gradient(135deg,var(--grad-1) 0%,var(--grad-2) 55%,var(--grad-3) 100%);border-radius:20px;padding:1.5rem 1.75rem;margin-bottom:1.25rem;position:relative;overflow:hidden;color:#fff}
.dash-hero::before{content:'';position:absolute;width:280px;height:280px;border-radius:50%;background:rgba(255,255,255,.07);top:-80px;right:-60px;pointer-events:none}
.dash-hero::after{content:'';position:absolute;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.05);bottom:-60px;right:80px;pointer-events:none}
.dash-hero-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;position:relative;z-index:1}
.dash-hero-greet{font-size:.82rem;opacity:.85;margin-bottom:.15rem;font-weight:500}
.dash-hero-name{font-size:1.45rem;font-weight:900;line-height:1.15}
.dash-hero-wallet{text-align:right;flex-shrink:0}
.dash-hero-wlbl{font-size:.7rem;opacity:.75;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.1rem}
.dash-hero-wamt{font-size:1.6rem;font-weight:900;letter-spacing:-.02em}
.dash-hero-actions{display:flex;gap:.6rem;margin-top:1.1rem;position:relative;z-index:1}
.dash-hero-btn{padding:.45rem 1rem;border-radius:50px;font-size:.8rem;font-weight:700;cursor:pointer;border:none;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:.35rem}
.dash-hero-btn-white{background:#fff;color:var(--grad-1)}
.dash-hero-btn-white:hover{background:rgba(255,255,255,.9)}
.dash-hero-btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3)}
.dash-hero-btn-ghost:hover{background:rgba(255,255,255,.25)}

/* ── Stat cards ── */
.my-stat-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:.85rem;margin-bottom:1.25rem}
.my-stat-card{text-align:left;padding:1.1rem 1.1rem .95rem;position:relative;overflow:hidden;border-radius:16px}
.my-stat-card::after{content:attr(data-icon);position:absolute;right:-.2rem;bottom:-.5rem;font-size:3.2rem;opacity:.09;pointer-events:none;line-height:1}
.my-stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;margin-bottom:.6rem}
.my-stat-label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.2rem}
.my-stat-val{font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,var(--grad-1),var(--grad-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.my-stat-icon-wallet{background:linear-gradient(135deg,rgba(255,43,79,.15),rgba(255,138,0,.15))}
.my-stat-icon-active{background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(5,150,105,.18))}
.my-stat-icon-orders{background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(234,88,12,.18))}
.my-stat-icon-spent{background:linear-gradient(135deg,rgba(236,72,153,.18),rgba(219,39,119,.18))}

/* ── Quick Actions ── */
.dash-section-title{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.7rem}
.my-qa{display:grid;grid-template-columns:repeat(6,1fr);gap:.65rem;margin-bottom:1.5rem}
.my-qa-tile{display:flex;flex-direction:column;align-items:center;gap:.45rem;padding:1rem .5rem .85rem;background:var(--card);border:1.5px solid var(--border);border-radius:14px;cursor:pointer;transition:all .18s;text-align:center;position:relative;overflow:hidden}
.my-qa-tile::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--grad-1),var(--grad-2));opacity:0;transition:opacity .18s;border-radius:13px}
.my-qa-tile:hover::before{opacity:.06}
.my-qa-tile:hover{border-color:var(--grad-1);transform:translateY(-3px);box-shadow:0 8px 20px rgba(99,102,241,.13)}
.my-qa-tile:active{transform:translateY(-1px)}
.my-qa-icon-wrap{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;position:relative;z-index:1;flex-shrink:0}
.my-qa-lbl{font-size:.71rem;font-weight:700;color:var(--text);position:relative;z-index:1;line-height:1.3}
.qa-plans .my-qa-icon-wrap{background:linear-gradient(135deg,var(--grad-1),var(--grad-2))}
.qa-orders .my-qa-icon-wrap{background:linear-gradient(135deg,#f59e0b,#ea580c)}
.qa-topup .my-qa-icon-wrap{background:linear-gradient(135deg,#10b981,#059669)}
.qa-referral .my-qa-icon-wrap{background:linear-gradient(135deg,#ec4899,#db2777)}
.qa-support .my-qa-icon-wrap{background:linear-gradient(135deg,#0ea5e9,#0284c7)}
.qa-profile .my-qa-icon-wrap{background:linear-gradient(135deg,#8b5cf6,#7c3aed)}

/* ── Active Subs ── */
.dash-active-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem;margin-bottom:1.5rem}
.dash-active-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:1rem 1.1rem;display:flex;align-items:center;gap:.9rem;transition:all .15s}
.dash-active-card:hover{border-color:var(--grad-1)}
.dash-active-icon{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--grad-1),var(--grad-2));display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;overflow:hidden}
.dash-active-info{min-width:0}
.dash-active-name{font-weight:700;font-size:.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-active-plat{font-size:.73rem;color:var(--muted);margin-bottom:.2rem}
.dash-active-exp{font-size:.7rem;color:var(--muted)}
.dash-active-exp.exp-soon{color:#f59e0b;font-weight:600}

/* ── Recent orders row ── */
.dash-order-row{display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;border-bottom:1px solid var(--border)}
.dash-order-row:last-child{border-bottom:none}
.dash-order-icon{width:38px;height:38px;border-radius:9px;background:linear-gradient(135deg,rgba(255,43,79,.1),rgba(255,138,0,.1));display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.dash-order-info{flex:1;min-width:0}
.dash-order-name{font-weight:600;font-size:.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-order-meta{font-size:.73rem;color:var(--muted);margin-top:.1rem}
.dash-order-right{text-align:right;flex-shrink:0}
.dash-order-amt{font-weight:700;font-size:.88rem}

.my-plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.my-plat-chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}

/* Plan card in portal */
.my-plan-card{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:1.25rem;display:flex;flex-direction:column;gap:.5rem;position:relative;overflow:hidden;transition:all .2s}
.my-plan-card:hover{transform:translateY(-3px);border-color:var(--grad-1);box-shadow:0 8px 24px rgba(255,43,79,.15)}
.my-plan-card-hdr{height:6px;background:linear-gradient(90deg,var(--grad-1),var(--grad-2));position:absolute;top:0;left:0;right:0;border-radius:14px 14px 0 0;display:none}
.my-plan-card.featured .my-plan-card-hdr{display:block}
.my-plan-img{width:100%;height:80px;object-fit:contain;border-radius:8px;margin-bottom:.25rem;background:var(--input-bg)}
.my-plan-plat-row{display:flex;align-items:center;gap:.5rem}
.my-plan-plat{font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.my-plan-badge{font-size:.7rem;font-weight:700;padding:.1rem .5rem;border-radius:20px;background:linear-gradient(135deg,var(--grad-1),var(--grad-2));color:#fff;margin-left:auto}
.my-plan-name{font-weight:700;font-size:.95rem;line-height:1.3}
.my-plan-dur{font-size:.78rem;color:var(--muted)}
.my-plan-price-row{display:flex;align-items:baseline;gap:.5rem}
.my-plan-price{font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,var(--grad-1),var(--grad-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.my-plan-orig{font-size:.8rem;color:var(--muted);text-decoration:line-through}
.my-plan-feats{list-style:none;display:flex;flex-direction:column;gap:.3rem;font-size:.8rem;color:var(--muted)}
.my-plan-feats li::before{content:'✓ ';color:var(--green);font-weight:700}
.my-plan-del{font-size:.75rem;font-weight:700;color:var(--grad-1);background:rgba(255,43,79,.1);border-radius:6px;padding:.15rem .45rem;display:inline-block;width:fit-content}

/* Orders */
.my-order{display:flex;align-items:center;gap:.9rem;padding:.85rem;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:.6rem}
.my-order-icon{font-size:1.7rem;flex-shrink:0}
.my-order-info{flex:1;min-width:0}
.my-order-name{font-weight:600;font-size:.875rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-order-meta{font-size:.75rem;color:var(--muted);margin-top:.15rem}
.my-order-right{display:flex;flex-direction:column;align-items:flex-end;gap:.3rem;flex-shrink:0}
.my-order-amt{font-weight:700;font-size:.875rem}

/* Wallet */
.my-wallet-card{background:linear-gradient(135deg,var(--grad-1),var(--grad-2));border-radius:16px;padding:1.75rem;color:#fff;margin-bottom:1.5rem;position:relative;overflow:hidden}
.my-wallet-card::after{content:'₹';position:absolute;right:-10px;top:-20px;font-size:7rem;opacity:.1;font-weight:900}
.my-wallet-lbl{font-size:.85rem;opacity:.85;margin-bottom:.25rem}
.my-wallet-amt{font-size:2.5rem;font-weight:900}
.my-topup-methods{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.my-topup-m{padding:1.2rem;background:var(--card);border:1.5px solid var(--border);border-radius:12px;cursor:pointer;transition:all .15s;text-align:center}
.my-topup-m:hover,.my-topup-m.active{border-color:var(--grad-1)}
.my-topup-icon{font-size:1.8rem;margin-bottom:.35rem}
.my-topup-name{font-weight:700;font-size:.875rem}
.my-topup-sub{font-size:.75rem;color:var(--muted)}
.my-txn{display:flex;align-items:center;justify-content:space-between;padding:.7rem .9rem;border-bottom:1px solid var(--border);font-size:.875rem}
.my-txn:last-child{border-bottom:none}
.my-txn-pos{color:var(--green);font-weight:700}
.my-txn-neg{color:var(--red);font-weight:700}

/* Profile completion banner */
.my-profile-banner{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(251,191,36,.12));border:1.5px solid rgba(245,158,11,.4);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:.9rem}
.my-profile-banner button{flex-shrink:0}

/* Creds */
.my-creds-box{background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:1rem;display:flex;flex-direction:column;gap:.6rem}
.my-cred-row{display:flex;justify-content:space-between;align-items:center;gap:.5rem}
.my-cred-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}

<script>
(function(){
'use strict';

// ── State ────────────────────────────────────────────────────────────────────
// Initial tab comes from either the URL path (/my/orders → "orders") or the
// data-initial-tab attribute the server injects when the route is /my/<tab>.
// Falls back to "dashboard" for plain /my.
function _initialTab(){
  const m=location.pathname.match(/^\/my\/([a-z]+)$/);
  if(m){return m[1];}
  const attr=document.documentElement.getAttribute('data-initial-tab');
  return attr||'dashboard';
}
let CUSTOMER = null, STORE = {}, ACTIVE_TAB = _initialTab();
let ALL_PLANS = [], ORDERS = [], TICKETS = [];
const PLATFORM_ICONS = {
  'Netflix':'🎬','Amazon Prime':'🛒','Disney+ Hotstar':'🏰','Disney+':'🏰',
  'Spotify':'🎵','YouTube Premium':'▶️','Apple TV+':'🍎',
  'Sony LIV':'📺','JioCinema':'🎥','ZEE5':'🎭','MX Player':'📱',
  'Bundle':'🎁',
};
const PLATFORM_COLORS = {
  'Netflix':'#e50914','Amazon Prime':'#00a8e0','Disney+ Hotstar':'#0063e5','Disney+':'#0063e5',
  'Spotify':'#1DB954','YouTube Premium':'#ff0000','Apple TV+':'#555','Sony LIV':'#003cff',
  'JioCinema':'#7b2ff7','ZEE5':'#8B2FC9','Bundle':'linear-gradient(135deg,#e50914,#0063e5,#1DB954)',
};
const TABS = [
  {id:'dashboard',label:'Dashboard',icon:'🏠'},
  {id:'plans',label:'Plans',icon:'🎬'},
  {id:'orders',label:'Orders',icon:'📦'},
  {id:'referral',label:'Referral',icon:'🎁'},
  {id:'support',label:'Support',icon:'🎧'},
  {id:'profile',label:'Profile',icon:'👤'},
];

// ── Helpers ──────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(n){return '₹'+Number(n||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtDate(s){if(!s)return '—';try{return new Date(s).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}catch{return s}}
function statusBadge(s){
  const map={pending:'badge-yellow',processing:'badge-blue',delivered:'badge-green',expired:'badge-grey',cancelled:'badge-red',open:'badge-blue',closed:'badge-grey',approved:'badge-green',rejected:'badge-red'};
  return `<span class="badge ${map[s]||'badge-grey'}">${s||''}</span>`;
}
async function api(path,opts={}){
  const r=await fetch('/user/api'+path,{credentials:'include',headers:{'Content-Type':'application/json'},...opts});
  const j=await r.json();
  if(!r.ok)throw new Error(j.error||'Request failed');
  return j;
}
function showToast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`alert alert-${type}`;
  Object.assign(t.style,{position:'fixed',bottom:'5.5rem',left:'50%',transform:'translateX(-50%)',zIndex:9999,whiteSpace:'nowrap',minWidth:'200px',textAlign:'center',boxShadow:'var(--shadow-lg)',fontSize:'.875rem'});
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}
function openModal(html){
  // Double-tap guard: if a modal is already open, don't open another. Stops
  // two stacked overlays when a customer taps Buy twice quickly.
  if(document.querySelector('.modal-overlay'))return null;
  const ov=document.createElement('div');
  ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal">${html}</div>`;
  ov.querySelector('.modal').addEventListener('click',e=>e.stopPropagation());
  // Single close path that ALWAYS detaches every listener, no matter how
  // the user closes — overlay click / X icon / Cancel button / Esc key.
  // Prior bug: onKey only removed the keydown listener on Esc, so after
  // every Cancel/X/overlay close a stale keydown listener accumulated on
  // document.
  const onKey=(e)=>{ if(e.key==='Escape') close(); };
  let closed=false;
  const close=()=>{
    if(closed)return; closed=true;
    document.removeEventListener('keydown',onKey);
    ov.remove();
    document.body.classList.remove('modal-open');
  };
  ov.addEventListener('click',close);
  document.body.appendChild(ov);
  document.body.classList.add('modal-open');
  ov.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',close));
  document.addEventListener('keydown',onKey);
  return ov;
}
function setLoading(btn,loading,text=''){if(loading){btn._orig=btn.textContent;btn.disabled=true;btn.textContent='⏳ '+text}else{btn.disabled=false;btn.textContent=btn._orig||text}}

// ── Theme ────────────────────────────────────────────────────────────────────
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  ['theme-toggle-hdr','theme-toggle-drawer'].forEach(id=>{
    const el=document.getElementById(id);
    if(el)el.textContent=t==='dark'?'☀️ Light':'🌙 Dark';
  });
}
function toggleTheme(){
  const next=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';
  localStorage.setItem('theme',next);applyTheme(next);
}
document.getElementById('theme-toggle-hdr').addEventListener('click',toggleTheme);
document.getElementById('theme-toggle-drawer').addEventListener('click',toggleTheme);
applyTheme(document.documentElement.getAttribute('data-theme')||'dark');

// ── Navigation ────────────────────────────────────────────────────────────────
function buildNav(){
  const nav=document.getElementById('tab-nav');
  nav.innerHTML=TABS.map(t=>`<button class="my-tab-btn${ACTIVE_TAB===t.id?' active':''}" data-tab="${t.id}">${t.icon} ${t.label}</button>`).join('');
  nav.querySelectorAll('.my-tab-btn').forEach(b=>b.addEventListener('click',()=>goTab(b.dataset.tab)));
  const bn=document.getElementById('bottom-nav');
  bn.querySelectorAll('.my-bnav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===ACTIVE_TAB));
  const dt=document.getElementById('drawer-tabs');
  dt.innerHTML=TABS.map(t=>`<button class="my-dtab" data-tab="${t.id}"><span class="di">${t.icon}</span>${t.label}</button>`).join('');
  dt.querySelectorAll('.my-dtab').forEach(b=>b.addEventListener('click',()=>{closeDrawer();goTab(b.dataset.tab);}));
}
function goTab(id, opts){
  ACTIVE_TAB=id;buildNav();
  const handlers={dashboard:renderDashboard,plans:renderPlans,orders:renderOrders,referral:renderReferral,support:renderSupport,profile:renderProfile};
  // Update the URL so each tab feels like a separate page (/my/plans, etc.)
  // without a full reload. Skip the pushState when called from popstate or
  // boot — opts.skipPush lets the caller suppress the history change.
  if(!opts||!opts.skipPush){
    const known={dashboard:1,plans:1,orders:1,referral:1,support:1,profile:1};
    const path=id==='dashboard'?'/my':known[id]?('/my/'+id):'/my';
    try{ if(location.pathname!==path) history.pushState({tab:id},'',path); }catch{}
  }
  (handlers[id]||renderDashboard)();
}
window.goTab=goTab;
// Browser back/forward syncs the SPA tab with the URL.
window.addEventListener('popstate',()=>{
  const m=location.pathname.match(/^\/my\/([a-z]+)$/);
  const t=m?m[1]:'dashboard';
  if(t!==ACTIVE_TAB) goTab(t,{skipPush:true});
});

// ── Drawer ────────────────────────────────────────────────────────────────────
document.getElementById('hamburger-btn').addEventListener('click',openDrawer);
document.getElementById('drawer-ov').addEventListener('click',closeDrawer);
document.getElementById('close-drawer').addEventListener('click',closeDrawer);
function openDrawer(){document.getElementById('side-drawer').classList.add('open');document.getElementById('drawer-ov').classList.add('open')}
function closeDrawer(){document.getElementById('side-drawer').classList.remove('open');document.getElementById('drawer-ov').classList.remove('open')}
document.getElementById('bottom-nav').addEventListener('click',e=>{
  const btn=e.target.closest('.my-bnav-btn');if(!btn)return;
  if(btn.dataset.tab==='__more'){openDrawer();return;}
  goTab(btn.dataset.tab);
});

// ── Auth rendering ────────────────────────────────────────────────────────────
function showAuthArea(html){
  document.getElementById('auth-area').style.display='flex';
  document.getElementById('portal-main').style.display='none';
  document.getElementById('tab-nav').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
  document.getElementById('auth-bottom-nav').style.display='';
  document.getElementById('my-footer').style.display='none';
  document.getElementById('auth-area').innerHTML=html;
}
function showPortal(){
  document.getElementById('auth-area').style.display='none';
  document.getElementById('auth-bottom-nav').style.display='none';
  document.getElementById('portal-main').style.display='';
  document.getElementById('tab-nav').style.display='';
  document.getElementById('bottom-nav').style.display='';
  document.getElementById('hamburger-btn').style.display='';
  document.getElementById('my-footer').style.display='';
}

// ── Auth: OTP + Password + Magic + WA ─────────────────────────────────────────
function renderAuth(initMethod, msgHtml){
  const method=initMethod||'otp';
  const waEnabled=STORE.wa_enabled==='1';
  // If the user landed here from a /plans Buy click, the buy intent is in
  // localStorage and possibly also the ?buy= query param. Show a banner so the
  // user knows the buy will resume after login.
  let pendingBuyId='';
  try { pendingBuyId=localStorage.getItem('pendingBuyPlanId')||new URLSearchParams(location.search).get('buy')||''; } catch {}
  const buyBanner=pendingBuyId?`<div class="alert alert-info" style="margin-bottom:1rem;text-align:center">🛒 Sign in to complete your purchase — you'll go straight to checkout after login.</div>`:'';
  showAuthArea(`
<div class="my-auth-box">
  ${buyBanner}
  ${msgHtml?`<div style="margin-bottom:1rem">${msgHtml}</div>`:''}
  <div class="my-auth-card">
    <div class="my-auth-logo">
      <div class="al-icon">🎬</div>
      <h1>Welcome to <span id="al-name">${esc(STORE.site_name||'OTT Store')}</span></h1>
      <p>Sign in to access your subscriptions</p>
    </div>
    ${STORE.telegram_bot_url?`<a class="my-tg-btn" href="${esc(STORE.telegram_bot_url)}" target="_blank" rel="noopener" style="text-decoration:none">
      <span style="font-size:1.3rem">✈️</span>
      <span>Buy on Telegram Bot</span>
    </a>
    <p style="font-size:.72rem;color:var(--muted);text-align:center;margin:.35rem 0 .25rem;line-height:1.4">
      ⚡ Instant auto-delivery · Pay with UPI or USDT · No sign-up needed
    </p>
    <div class="my-or">— OR SIGN IN BELOW —</div>`:''}
    <div class="my-auth-methods" id="auth-methods">
      <button class="mam-btn${method==='otp'?' active':''}" onclick="setMethod('otp')">📱 OTP</button>
      <button class="mam-btn${method==='password'?' active':''}" onclick="setMethod('password')">🔑 Password</button>
      <button class="mam-btn${method==='magic'?' active':''}" onclick="setMethod('magic')">✉️ Magic</button>
      ${waEnabled?`<button class="mam-btn${method==='whatsapp'?' active':''}" onclick="setMethod('whatsapp')">💬 WhatsApp</button>`:''}
    </div>
    <div id="auth-form-area"></div>
  </div>
  <p style="text-align:center;font-size:.82rem;color:var(--muted);margin-top:1rem">
    By signing in you agree to our <a href="/terms">Terms</a> &amp; <a href="/privacy">Privacy Policy</a>
  </p>
</div>`);
  setMethod(method);
}

window.setMethod=function(m){
  document.querySelectorAll('.mam-btn').forEach(b=>b.classList.remove('active'));
  const activeBtn=document.querySelector(`.mam-btn[onclick="setMethod('${m}')"]`);
  if(activeBtn)activeBtn.classList.add('active');
  const area=document.getElementById('auth-form-area');
  if(m==='otp')renderOtpForm(area);
  else if(m==='password')renderPasswordForm(area);
  else if(m==='magic')renderMagicForm(area);
  else if(m==='whatsapp')renderWaForm(area);
};

// ── OTP Form (2-step) ─────────────────────────────────────────────────────────
function renderOtpForm(area){
  area.innerHTML=`
<div id="otp-step1" class="my-otp-step">
  <div id="otp-err1" style="display:none" class="my-err"></div>
  <div class="form-group">
    <label class="my-lbl">Email address</label>
    <input class="form-input" id="otp-email" type="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <button class="btn btn-primary btn-block" id="otp-send-btn" onclick="otpSend()">Send OTP →</button>
  <p style="text-align:center;font-size:.8rem;color:var(--muted)">New here? An account is created automatically.</p>
</div>
<div id="otp-step2" class="my-otp-step hidden">
  <div id="otp-err2" style="display:none" class="my-err"></div>
  <p style="font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:.5rem">Enter the 6-digit code sent to <strong id="otp-email-display"></strong></p>
  <div class="my-otp-input">
    <input class="form-input" id="otp-code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" autocomplete="one-time-code" style="text-align:center;letter-spacing:.3rem;font-size:1.25rem;font-weight:800">
  </div>
  <button class="btn btn-primary btn-block" id="otp-verify-btn" onclick="otpVerify()">Verify &amp; Login</button>
  <p class="my-resend">Didn't get it? <span onclick="otpBack()">Try again</span> or <span onclick="otpSendNew()">Resend OTP</span></p>
</div>`;
  document.getElementById('otp-email').addEventListener('keypress',e=>{if(e.key==='Enter')otpSend();});
  document.getElementById('otp-code').addEventListener('keypress',e=>{if(e.key==='Enter')otpVerify();});
  const savedEmail=localStorage.getItem('my_last_email');
  if(savedEmail)document.getElementById('otp-email').value=savedEmail;
}

window.otpSend=async function(){
  const email=document.getElementById('otp-email').value.trim();
  const err=document.getElementById('otp-err1');
  const btn=document.getElementById('otp-send-btn');
  if(!email){err.textContent='Please enter your email address.';err.style.display='';return;}
  setLoading(btn,true,'Sending...');
  try{
    await api('/send-otp',{method:'POST',body:JSON.stringify({email})});
    localStorage.setItem('my_last_email',email);
    document.getElementById('otp-step1').classList.add('hidden');
    document.getElementById('otp-step2').classList.remove('hidden');
    document.getElementById('otp-email-display').textContent=email;
    setTimeout(()=>document.getElementById('otp-code').focus(),100);
  }catch(ex){err.textContent=ex.message;err.style.display='';setLoading(btn,false);}
};

window.otpBack=function(){
  document.getElementById('otp-step1').classList.remove('hidden');
  document.getElementById('otp-step2').classList.add('hidden');
};
window.otpSendNew=async function(){
  const email=localStorage.getItem('my_last_email')||'';
  if(!email)return otpBack();
  try{await api('/send-otp',{method:'POST',body:JSON.stringify({email})});showToast('New OTP sent!','success');}catch(ex){showToast(ex.message,'error');}
};

window.otpVerify=async function(){
  const email=localStorage.getItem('my_last_email')||'';
  const otp=document.getElementById('otp-code').value.trim();
  const err=document.getElementById('otp-err2');
  const btn=document.getElementById('otp-verify-btn');
  if(!otp){err.textContent='Enter the 6-digit code.';err.style.display='';return;}
  setLoading(btn,true,'Verifying...');
  try{
    const r=await api('/verify-otp',{method:'POST',body:JSON.stringify({email,otp})});
    await initPortal(r);
  }catch(ex){err.textContent=ex.message;err.style.display='';setLoading(btn,false);}
};

// ── Password Form ─────────────────────────────────────────────────────────────
function renderPasswordForm(area){
  area.innerHTML=`

async function initPortal(loginResult){
  try{
    [STORE,CUSTOMER]=await Promise.all([api('/store'),api('/me')]);
    const siteName=STORE.site_name||'OTT Store';
    if(STORE.logo_light_url||STORE.logo_dark_url){
      const l=STORE.logo_light_url||STORE.logo_dark_url, d=STORE.logo_dark_url||STORE.logo_light_url;
      document.getElementById('my-logo').innerHTML=`<img src="${l}" class="logo-light" alt="${siteName}"><img src="${d}" class="logo-dark" alt="${siteName}">`;
    } else { document.getElementById('my-logo').textContent=siteName; }
    document.title=`My Account — ${siteName}`;
    document.getElementById('my-title').textContent=`My Account — ${siteName}`;
    document.getElementById('footer-copy').textContent=`© ${new Date().getFullYear()} ${siteName}`;
    if(STORE.store_theme){document.documentElement.setAttribute('data-store-theme',STORE.store_theme);localStorage.setItem('store_theme',STORE.store_theme);}
    updateHeaderUI();
    showPortal();
    buildNav();
    // Handle URL params
    const params=new URLSearchParams(location.search);
    if(params.get('auth_success')==='1'){showToast('Welcome! You\'re now logged in.','success');}
    // Handle hash routing (reset-password)
    if(location.hash.startsWith('#reset-password')){
      const tokenParam=new URLSearchParams(location.hash.replace('#reset-password?','')).get('token');
      if(tokenParam)renderResetPassword(tokenParam);return;
    }
    // Handle pending buy intent (from /plans Buy click, possibly surviving login).
    // Source of truth: ?buy=<id> from a direct /plans → /my redirect, OR the
    // pendingBuyPlanId localStorage key (set by /plans, survives auth redirect).
    let buyId=params.get('buy');
    if(!buyId){ try { buyId=localStorage.getItem('pendingBuyPlanId'); } catch {} }
    if(buyId){
      try { localStorage.removeItem('pendingBuyPlanId'); } catch {}
      goTab('plans',{skipPush:true});
      setTimeout(()=>{const btn=document.querySelector('.buy-plan-btn[data-id="'+buyId+'"]');if(btn)btn.click();},500);
      return;
    }
    // Boot into the tab the user actually requested via URL (/my/orders →
    // orders), not always the dashboard. skipPush so we don't pushState
    // over our own initial URL.
    goTab(ACTIVE_TAB,{skipPush:true});
    setTimeout(showRequiredWhatsappModal,150);
  }catch(e){
    // Not logged in or API error
    try{STORE=await api('/store');}catch{}
    const siteName=STORE?.site_name||'OTT Store';
    if(STORE?.logo_light_url||STORE?.logo_dark_url){
      const l=STORE.logo_light_url||STORE.logo_dark_url, d=STORE.logo_dark_url||STORE.logo_light_url;
      document.getElementById('my-logo').innerHTML=`<img src="${l}" class="logo-light" alt="${siteName}"><img src="${d}" class="logo-dark" alt="${siteName}">`;
    } else { document.getElementById('my-logo').textContent=siteName; }
    document.title=`Login — ${siteName}`;
    document.getElementById('footer-copy').textContent=`© ${new Date().getFullYear()} ${siteName}`;
    if(STORE?.store_theme) document.documentElement.setAttribute('data-store-theme',STORE.store_theme);
    // Handle URL error/success params
    const params=new URLSearchParams(location.search);
    let msgHtml='';
    if(params.get('auth_error')==='expired_link') msgHtml='<div class="my-err">⚠️ This magic link has expired or already been used. Please request a new one.</div>';
    else if(params.get('auth_error')==='invalid_link') msgHtml='<div class="my-err">⚠️ Invalid login link.</div>';
    else if(params.get('auth_error')==='server_error') msgHtml='<div class="my-err">⚠️ A server error occurred. Please try again.</div>';
    // Reset password from hash
    if(location.hash.startsWith('#reset-password')){
      const tokenParam=new URLSearchParams(location.hash.replace('#reset-password?','')).get('token');
      if(tokenParam){renderResetPassword(tokenParam);return;}
    }
    renderAuth('otp',msgHtml);
  }
}

async function renderPlans(){
  const main=document.getElementById('portal-main');
  main.innerHTML=`<div class="spinner"></div>`;
  try{
    ALL_PLANS=await api('/plans');
    let activePlat='';
    function renderFiltered(){
      const filtered=activePlat?ALL_PLANS.filter(p=>p.platform===activePlat):ALL_PLANS;
      document.getElementById('plans-content').innerHTML=filtered.length
        ?`<div class="my-plans-grid">${filtered.map(portalPlanCard).join('')}</div>`
        :'<p style="color:var(--muted)">No plans available.</p>';
      bindPlanBtns();
    }
    const platforms=[...new Set(ALL_PLANS.map(p=>p.platform))];
    main.innerHTML=`
<h2 style="font-weight:800;margin-bottom:1rem">OTT Plans</h2>
<div class="my-plat-chips">
  <button class="platform-chip active" data-plat="">All Platforms</button>
  ${platforms.map(p=>`<button class="platform-chip" data-plat="${esc(p)}">${PLATFORM_ICONS[p]||'📺'} ${esc(p)}</button>`).join('')}
</div>
<div id="plans-content"></div>`;
    main.querySelectorAll('.platform-chip').forEach(c=>c.addEventListener('click',()=>{
      activePlat=c.dataset.plat;
      main.querySelectorAll('.platform-chip').forEach(x=>x.classList.toggle('active',x===c));
      renderFiltered();
    }));
    renderFiltered();
  }catch(e){main.innerHTML=`<div class="alert alert-error">${esc(e.message)}</div>`;}
}

function confirmBuy(planId,planName,price){
  // Pre-flight: refuse to open the modal if the plan no longer exists in the
  // current ALL_PLANS list (admin deleted it, or buy intent was stored
  // pointing at a plan that's since been removed). Without this guard the
  // user lands in a loop: open modal → click tile → server 404 → 'Back'
  // → re-open modal → same 404.
  const numId=Number(planId);
  if(Array.isArray(ALL_PLANS)&&ALL_PLANS.length&&!ALL_PLANS.some(p=>p.id===numId)){
    showToast('That plan is no longer available.','error');
    return;
  }
  const cost=Number(price);
  // Force a WhatsApp number before any purchase — we deliver + send updates there.
  if(!CUSTOMER||!CUSTOMER.phone){
    const ovw=openModal(`
<div class="modal-header"><h3>📲 Add WhatsApp for delivery</h3><button class="btn-icon" data-close>✕</button></div>
<div class="modal-body">
  <p style="font-size:.88rem;color:var(--muted);margin:0 0 .75rem">We deliver your order and send updates on WhatsApp. Add your number for <strong>faster delivery</strong>.</p>
  <input class="form-input" id="buy-wa" type="tel" placeholder="+91 98765 43210" autocomplete="tel">
  <div id="buy-wa-err" class="my-err" style="display:none;margin-top:.5rem"></div>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" data-close>Cancel</button>
  <button class="btn btn-primary" id="buy-wa-save">Save & Continue →</button>
</div>`);
    document.getElementById('buy-wa-save').onclick=async()=>{
      const ph=(document.getElementById('buy-wa').value||'').trim();
      const e=document.getElementById('buy-wa-err');
      if(ph.replace(/\D/g,'').length<10){e.textContent='Please enter a valid WhatsApp number.';e.style.display='';return;}
      try{
        await api('/complete-profile',{method:'PUT',body:JSON.stringify({phone:ph})});
        CUSTOMER=await api('/me');
        ovw.remove();
        confirmBuy(planId,planName,price);
      }catch(ex){e.textContent=(ex&&ex.message)||'Could not save number.';e.style.display='';}
    };
    return;
  }
  const imapOn=STORE.imap_enabled==='1';
  const upiOn=imapOn&&!!STORE.upi_id;
  const binanceOn=imapOn&&STORE.usdt_binance_enabled==='1'&&!!STORE.usdt_binance_uid;
  const bep20On=imapOn&&STORE.usdt_bep20_enabled==='1'&&!!STORE.usdt_bep20_address;
  const trc20On=imapOn&&STORE.usdt_trc20_enabled==='1'&&!!STORE.usdt_trc20_address;
  const rate=parseFloat(STORE.usdt_inr_rate||'99');
  const feePct=parseFloat(STORE.usdt_fee_pct||'1.5');
  const usdtPreview=rate>0?(cost/rate*(1+feePct/100)).toFixed(2):null;

  const anyMethod=upiOn||binanceOn||bep20On||trc20On;
  const tileUpi=upiOn?`<button class="my-topup-m" data-pay="upi" style="text-align:left">
    <div style="display:flex;align-items:center;gap:.7rem">
      <div class="my-topup-icon" style="margin:0">📱</div>
      <div style="flex:1">
        <div class="my-topup-name">UPI</div>
        <div class="my-topup-sub">Auto-verified · ${fmt(cost)}</div>
      </div>
      <div style="font-size:1.2rem;color:var(--muted)">›</div>
    </div>
  </button>`:'';
  const tileBinance=binanceOn?`<button class="my-topup-m" data-pay="binance" style="text-align:left">
    <div style="display:flex;align-items:center;gap:.7rem">
      <div class="my-topup-icon" style="margin:0">🟡</div>
      <div style="flex:1">
        <div class="my-topup-name">USDT · Binance</div>
        <div class="my-topup-sub">Auto-verified${usdtPreview?` · ~$${usdtPreview}`:''}</div>
      </div>
      <div style="font-size:1.2rem;color:var(--muted)">›</div>
    </div>
  </button>`:'';
  const tileBep20=bep20On?`<button class="my-topup-m" data-pay="bep20" style="text-align:left">
    <div style="display:flex;align-items:center;gap:.7rem">
      <div class="my-topup-icon" style="margin:0">🟨</div>
      <div style="flex:1">
        <div class="my-topup-name">USDT · BEP20</div>
        <div class="my-topup-sub">BNB Smart Chain${usdtPreview?` · ~$${usdtPreview}`:''}</div>
      </div>
      <div style="font-size:1.2rem;color:var(--muted)">›</div>
    </div>
  </button>`:'';
  const tileTrc20=trc20On?`<button class="my-topup-m" data-pay="trc20" style="text-align:left">
    <div style="display:flex;align-items:center;gap:.7rem">
      <div class="my-topup-icon" style="margin:0">🔴</div>
      <div style="flex:1">
        <div class="my-topup-name">USDT · TRC20</div>
        <div class="my-topup-sub">Tron Network${usdtPreview?` · ~$${usdtPreview}`:''}</div>
      </div>
      <div style="font-size:1.2rem;color:var(--muted)">›</div>
    </div>
  </button>`:'';

  const emptyMsg=`<div class="alert alert-warn">No payment methods are enabled yet. Please contact support.${STORE.support_whatsapp?` <a href="https://wa.me/${STORE.support_whatsapp.replace(/\D/g,'')}" target="_blank" rel="noopener">Chat on WhatsApp →</a>`:''}</div>`;

  const ov=openModal(`
<div class="modal-header"><h3>Confirm Purchase</h3><button class="btn-icon" data-close>✕</button></div>
<div class="modal-body">
  <div style="background:var(--input-bg);border-radius:var(--radius-sm);padding:1rem;margin-bottom:1rem">
    <div style="font-size:.8rem;color:var(--muted)">Plan</div>
    <div style="font-weight:700">${esc(planName)}</div>
    <div style="font-size:1.3rem;font-weight:800;margin-top:.25rem" class="grad-text">${fmt(cost)}</div>
  </div>
  <div id="buy-payment-area">
    ${anyMethod?`<div style="font-size:.85rem;color:var(--muted);margin-bottom:.5rem">Choose payment method</div>
    <div style="display:flex;flex-direction:column;gap:.5rem">
      ${tileUpi}${tileBinance}${tileBep20}${tileTrc20}
    </div>`:emptyMsg}
  </div>
</div>
<div class="modal-footer">
  <button class="btn btn-secondary" data-close>Cancel</button>
</div>`);

  ov.querySelectorAll('[data-pay]').forEach(btn=>{
    btn.addEventListener('click',async()=>{
      const method=btn.dataset.pay;
      const area=document.getElementById('buy-payment-area');
      area.innerHTML=`<div class="spinner" style="margin:1rem auto"></div>`;
      try{
        if(method==='upi'){
          const r=await api('/checkout/upi-direct',{method:'POST',body:JSON.stringify({plan_id:Number(planId)})});
          showUpiPaymentStep(ov,area,r,planName);
        }else{
          const r=await api('/checkout/usdt-direct',{method:'POST',body:JSON.stringify({plan_id:Number(planId),network:method})});
          showUsdtPaymentStep(ov,area,r,planName);
        }
      }catch(e){
        area.innerHTML=`<div class="alert alert-error">${esc(e.message)}</div>
<button class="btn btn-secondary btn-block mt-2" id="buy-back-btn">← Back</button>`;
        document.getElementById('buy-back-btn').addEventListener('click',()=>{ov.remove();confirmBuy(planId,planName,price);});
      }
    });
  });

  // Pay-with-wallet (instant, no UPI step) — offered at the top when the wallet
  // balance covers the full price.
  (async () => {
    try {
      const w = await api('/wallet'); const bal = Number(w.balance || 0);
      if (bal + 0.001 < cost) return;
      const area = document.getElementById('buy-payment-area'); if (!area) return;
      const tile = document.createElement('button');
      tile.className = 'my-topup-m'; tile.type = 'button';
      tile.style.cssText = 'text-align:left;width:100%;border:1px solid rgba(34,197,94,.55);margin-bottom:.5rem';
      tile.innerHTML = '<div style="display:flex;align-items:center;gap:.7rem"><div class="my-topup-icon" style="margin:0;background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(16,185,129,.15))">💰</div><div style="flex:1"><div class="my-topup-name">Pay with Wallet</div><div class="my-topup-sub">Instant · balance '+fmt(bal)+'</div></div><div style="font-size:1.2rem;color:var(--muted)">›</div></div>';
      tile.addEventListener('click', async () => {
        if (!confirm('Pay '+fmt(cost)+' from your wallet (balance '+fmt(bal)+')?')) return;
        const a = document.getElementById('buy-payment-area'); a.innerHTML = '<div class="spinner" style="margin:1rem auto"></div>';
        try {
          const r = await api('/checkout/wallet', { method: 'POST', body: JSON.stringify({ plan_id: Number(planId) }) });
          a.innerHTML = '<div style="text-align:center;padding:1rem 0"><div style="font-size:2.6rem">✅</div><div style="font-weight:800;margin:.4rem 0">Order placed!</div><div class="muted" style="font-size:.85rem">Paid '+fmt(cost)+' from wallet · new balance '+fmt(r.new_balance)+'.<br>Your credentials are being delivered to your email.</div><button class="btn btn-primary btn-block mt-2" data-close>Done</button></div>';
          a.querySelector('[data-close]').addEventListener('click', () => { ov.remove(); if (typeof renderDashboard === 'function') renderDashboard(); });
        } catch (e) {
          a.innerHTML = '<div class="alert alert-error">'+esc(e.message)+'</div><button class="btn btn-secondary btn-block mt-2" id="wb-back">← Back</button>';
          document.getElementById('wb-back').addEventListener('click', () => { ov.remove(); confirmBuy(planId, planName, price); });
        }
      });
      area.insertBefore(tile, area.firstChild);
    } catch (e) {}
  })();
}

// ── Unique-amount alert: popup + chime so the customer can't miss the exact ₹ ──
function _cwPlayChime(){ try{ const C=window.AudioContext||window.webkitAudioContext; if(!C)return; const ctx=window._cwCtx||(window._cwCtx=new C()); if(ctx.state==='suspended')ctx.resume(); const t=ctx.currentTime; [880,1175,1568].forEach((f,i)=>{ const o=ctx.createOscillator(),g=ctx.createGain(); o.type='sine'; o.frequency.value=f; const s=t+i*0.16; g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(.35,s+.02); g.gain.exponentialRampToValueAtTime(.001,s+.4); o.connect(g); g.connect(ctx.destination); o.start(s); o.stop(s+.42); }); }catch(e){} }
if(!window._cwAudioUnlock){ window._cwAudioUnlock=1; ['pointerdown','touchstart','keydown'].forEach(ev=>document.addEventListener(ev,function(){ try{ const C=window.AudioContext||window.webkitAudioContext; if(!C)return; const c=window._cwCtx||(window._cwCtx=new C()); if(c.state==='suspended')c.resume(); }catch(e){} },{passive:true})); }
function showAmountAlert(amount){
  try{ _cwPlayChime(); }catch(e){}
  if(navigator.vibrate)try{ navigator.vibrate([120,60,120]); }catch(e){}

function showUpiPaymentStep(modalEl,area,r,planName){
  const upiLink=r.upi_link||`upi://pay?pa=${encodeURIComponent(r.upi_id)}&pn=${encodeURIComponent(r.upi_name||'Store')}&am=${r.unique_amount}&cu=INR`;
  // Prefer the DYNAMIC QR (exact amount baked in) so scanning can't pay the wrong
  // figure; fall back to the static merchant QR only if it's missing.
  const dynamicQr=!!r.upi_qr;
  const qr=(r.upi_qr||r.qr_url||STORE.upi_qr_url||'').trim();
  area.innerHTML=`
<div style="text-align:center;padding:.5rem 0">
  <div style="font-size:.8rem;color:var(--muted);margin-bottom:.25rem">Pay exactly</div>
  <div style="font-size:2rem;font-weight:900;color:var(--green)" class="grad-text">₹${r.unique_amount}</div>
  <div style="font-size:.75rem;color:var(--muted);margin-bottom:1rem">${dynamicQr?'Scan the QR or tap below — the exact amount is filled in for you':'(unique amount — do not round off)'}</div>
  ${qr?`<div style="display:flex;justify-content:center;margin-bottom:.4rem"><img src="${esc(qr)}" alt="UPI QR" style="width:180px;height:180px;border-radius:14px;background:#fff;padding:8px;object-fit:contain" loading="lazy" onerror="this.style.display='none'"></div>${dynamicQr?'<div style="font-size:.72rem;color:var(--green);margin-bottom:.6rem">✓ Amount auto-filled — just confirm in your UPI app</div>':''}`:''}
  <div style="background:var(--input-bg);border-radius:var(--radius-sm);padding:.75rem;margin-bottom:.75rem">
    <div style="font-size:.75rem;color:var(--muted)">UPI ID</div>
    <div style="font-weight:700;font-size:1rem;word-break:break-all">${esc(r.upi_id)}</div>
  </div>
  <a href="${upiLink}" class="btn btn-primary btn-block" style="margin-bottom:.5rem">📱 Open UPI App</a>
  <div id="upi-poll-status" style="margin-top:1rem;font-size:.875rem;color:var(--muted)">
    <span class="spinner-inline"></span> Waiting for payment confirmation...
  </div>
  <p style="font-size:.75rem;color:var(--muted);margin-top:.5rem">Auto-verified within 30 seconds after payment</p>
</div>`;

  showAmountAlert(r.unique_amount);

  // Poll every 5 seconds
  let pollCount=0, consecutiveErrors=0;
  const maxPolls=72; // 6 minutes
  const timer=setInterval(async()=>{
    if(!document.body.contains(modalEl)){clearInterval(timer);return;}
    pollCount++;
    if(pollCount>maxPolls){
      clearInterval(timer);
      document.getElementById('upi-poll-status').innerHTML='⏱ Timed out. If you paid, check Orders tab in a minute.';
      return;
    }
    try{
      const s=await api('/checkout/poll/'+r.topup_id);
      consecutiveErrors=0;
      if(s.status==='paid'){
        clearInterval(timer);
        modalEl.remove();
        CUSTOMER=await api('/me').catch(()=>CUSTOMER);
        updateHeaderUI();
        showToast('Payment confirmed! Order placed.','success');
        goTab('orders');
      }
    }catch(err){
      // Surface persistent polling failure so customer isn't left staring at
      // "Waiting…" if the server is down. Reset on success above.
      consecutiveErrors++;
      if(consecutiveErrors>=5){
        const el=document.getElementById('upi-poll-status');
        if(el)el.innerHTML='⚠️ Connection issue checking status. Retrying… (your payment is still being watched server-side)';
      }
    }
  },5000);
}

// ── Orders ─────────────────────────────────────────────────────────────────────
let ORDERS_FILTER='all', ORDERS_SEARCH='';
async function renderOrders(){
  const main=document.getElementById('portal-main');
  main.innerHTML=`<div class="spinner"></div>`;
  try{
    ORDERS=await api('/orders');
    drawOrders();
  }catch(e){main.innerHTML=`<div class="alert alert-error">${esc(e.message)}</div>`;}
}

function _filteredOrders(){
  const now=Date.now();
  let list=ORDERS.slice();
  if(ORDERS_FILTER==='active') list=list.filter(o=>o.status==='delivered'&&o.expires_at&&new Date(o.expires_at).getTime()>now);
  else if(ORDERS_FILTER==='expired') list=list.filter(o=>o.status==='expired'||(o.status==='delivered'&&o.expires_at&&new Date(o.expires_at).getTime()<=now));
  else if(ORDERS_FILTER==='pending') list=list.filter(o=>o.status==='pending'||o.status==='processing');
  if(ORDERS_SEARCH){
    const q=ORDERS_SEARCH.toLowerCase();
    list=list.filter(o=>(o.plan_name||'').toLowerCase().includes(q)||(o.platform||'').toLowerCase().includes(q));
  }
  return list;
}

function drawOrders(){
  const main=document.getElementById('portal-main');
  const list=_filteredOrders();
  const counts={
    all:ORDERS.length,
    active:ORDERS.filter(o=>o.status==='delivered'&&o.expires_at&&new Date(o.expires_at).getTime()>Date.now()).length,
    expired:ORDERS.filter(o=>o.status==='expired'||(o.status==='delivered'&&o.expires_at&&new Date(o.expires_at).getTime()<=Date.now())).length,
    pending:ORDERS.filter(o=>o.status==='pending'||o.status==='processing').length,
  };
  const chip=(k,label)=>`<button class="my-order-chip${ORDERS_FILTER===k?' active':''}" data-filter="${k}">${label} <span style="opacity:.6">(${counts[k]})</span></button>`;
  main.innerHTML=`<h2 style="font-weight:800;margin-bottom:1rem">My Orders</h2>
<div style="display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem;align-items:center">
  ${chip('all','All')}${chip('active','Active')}${chip('pending','Pending')}${chip('expired','Expired')}
</div>
<input class="form-input" id="orders-search" placeholder="🔍 Search by plan or platform…" value="${esc(ORDERS_SEARCH)}" style="margin-bottom:1rem">
${list.length?list.map(orderItem).join(''):'<div class="card text-center" style="padding:2.5rem"><p style="font-size:2rem">📦</p><p class="muted">No orders match this filter.</p><button class="btn btn-primary mt-4" onclick="goTab(\'plans\')">Browse Plans</button></div>'}`;
  main.querySelectorAll('.my-order-chip').forEach(b=>b.addEventListener('click',()=>{ORDERS_FILTER=b.dataset.filter;drawOrders();}));
  main.querySelectorAll('.view-creds-btn').forEach(b=>b.addEventListener('click',()=>viewCredentials(b.dataset.id)));
  main.querySelectorAll('.view-order-btn').forEach(b=>b.addEventListener('click',()=>viewOrderDetail(b.dataset.id)));
  main.querySelectorAll('.renew-order-btn').forEach(b=>b.addEventListener('click',()=>renewOrder(b.dataset.id,b.dataset.name,b.dataset.price)));
  const si=document.getElementById('orders-search');
  if(si){let t;si.addEventListener('input',()=>{clearTimeout(t);t=setTimeout(()=>{ORDERS_SEARCH=si.value.trim();drawOrders();si.focus();si.setSelectionRange(si.value.length,si.value.length);},250);});}
}

// ── Full order detail modal: status timeline + payment + plan + credentials ──
async function viewOrderDetail(orderId){
  try{
    const o=await api(`/orders/${orderId}`);
    // Timeline steps: Placed → Paid → Delivered → Expires
    const steps=[
      { key:'placed',    label:'Order Placed',  at:o.created_at, done:true },
      { key:'paid',      label:'Payment Received', at:o.payment?.paid_at,

      { key:'delivered', label:'Delivered',     at:o.status==='delivered'?o.created_at:null,
        done:o.status==='delivered' },
      { key:'expires',   label:o.expires_at&&new Date(o.expires_at).getTime()<=Date.now()?'Expired':'Expires',
        at:o.expires_at, done:o.expires_at&&new Date(o.expires_at).getTime()<=Date.now() },
    ];
    const timeline=steps.map(s=>`
<div style="display:flex;gap:.75rem;align-items:start;margin-bottom:.5rem">
  <div style="width:20px;height:20px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;margin-top:2px;
    background:${s.done?'linear-gradient(135deg,#34f59b,#10b981)':'var(--input-bg)'};
    border:2px solid ${s.done?'#34f59b':'var(--border)'};color:#fff;font-size:.7rem">${s.done?'✓':''}</div>

    <div style="font-weight:700;font-size:.88rem">${esc(s.label)}</div>
    <div style="font-size:.75rem;color:var(--muted)">${s.at?fmtDate(s.at):'—'}</div>
  </div>
</div>`).join('');

    // Payment summary
    const pm=o.payment;
    const methodLabel=pm?({upi_imap:'UPI · Auto-verified',usdt_binance:'USDT · Binance',usdt_bep20:'USDT · BEP20',usdt_trc20:'USDT · TRC20'}[pm.method]||pm.method):'—';
    const amtText=pm?(pm.currency==='USDT'
      ?`${(pm.unique_amount_usdt||pm.amount_usdt||0).toFixed(3)} USDT`
      :`₹${Number(pm.unique_amount||pm.amount_inr||0).toLocaleString('en-IN',{minimumFractionDigits:2,maximumFractionDigits:2})}`):'';

    // Credentials section (delivered only)
    const credsBlock=(o.credentials&&Object.keys(o.credentials).length)?`
<hr style="border-color:var(--border);margin:1rem 0">
<div style="font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem">🔑 Credentials</div>
<div class="my-creds-box">${
  Object.entries(o.credentials).filter(([k])=>k!=='').map(([k,v])=>`
<div class="my-cred-row">
  <span class="my-cred-label">${esc(k)}</span>
  <span class="my-cred-val" id="ocv-${esc(k)}">${esc(v)}</span>
  <button class="btn btn-secondary btn-sm" data-copy="ocv-${esc(k)}" data-label="${esc(k)}">Copy</button>
</div>`).join('')
}</div>
${o.delivery_note?`<div class="alert alert-info" style="margin-top:.75rem">📝 ${esc(o.delivery_note)}</div>`:''}
${STORE.support_whatsapp?`<button class="btn btn-green btn-block mt-3" id="creds-wa-share">💬 Forward credentials to my WhatsApp</button>`:''}
`:'';

    // Plan features
    const feats=Array.isArray(o.plan_features)?o.plan_features:[];
    const featsBlock=feats.length?`<ul style="margin:.5rem 0 0 1rem;padding:0;font-size:.85rem;color:var(--muted)">${feats.slice(0,6).map(f=>`<li style="margin-bottom:2px">${esc(f)}</li>`).join('')}</ul>`:'';

    const isExp=o.expires_at&&new Date(o.expires_at).getTime()<=Date.now();
    const renewBtn=(isExp||o.status==='expired')&&o.plan_id?`<button class="btn btn-primary" id="order-renew-btn">🔄 Renew this plan</button>`:'';

<div class="modal-header"><h3>Order #${o.id}</h3><button class="btn-icon" data-close>✕</button></div>
<div class="modal-body">
  <div style="background:var(--input-bg);border-radius:10px;padding:1rem;margin-bottom:1rem">
    <div style="display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem">
      <div style="font-size:1.4rem">${PLATFORM_ICONS[o.platform]||'📺'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:800">${esc(o.plan_name||'Plan')}</div>
        <div style="font-size:.78rem;color:var(--muted)">${esc(o.platform||'')}</div>
      </div>
      ${statusBadge(o.status)}
    </div>
    <div style="font-size:1.25rem;font-weight:800" class="grad-text">${fmt(o.amount_inr)}</div>
    ${featsBlock}
  </div>

  <div style="font-weight:700;margin-bottom:.5rem">Payment</div>
  <div style="font-size:.85rem;line-height:1.7">

    }));

    if(wa)wa.addEventListener('click',()=>{

      // never reads "Email: undefined" or "Password: " for a partially-
      // populated credentials object.
      const lines=Object.entries(o.credentials||{})
        .filter(([k,v])=>k&&v!=null&&String(v).trim()!=='')
        .map(([k,v])=>`${k}: ${v}`).join('\n');

      const txt=`Order #${o.id} — ${o.plan_name||''}\n\n${lines}${o.delivery_note?`\n\n${o.delivery_note}`:''}`;
      const phone=String(STORE.support_whatsapp||'').replace(/\D/g,'');
      window.open(`https://wa.me/${phone}?text=${encodeURIComponent(txt)}`,'_blank','noopener');
    });
    const rb=document.getElementById('order-renew-btn');
    if(rb)rb.addEventListener('click',()=>{ov.remove();renewOrder(o.plan_id,o.plan_name,o.amount_inr);});
  }catch(e){showToast(e.message,'error');}

  const expiresAt=r.expires_at?new Date(r.expires_at).getTime():(Date.now()+r.window_minutes*60*1000);
  const timerEl=document.getElementById('usdt-timer');
  function tick(){
    if(!document.body.contains(modalEl))return;
    const ms=expiresAt-Date.now();
    if(ms<=0){if(timerEl)timerEl.textContent='⏱ Payment window expired — re-open checkout to try again.';return;}
    const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000).toString().padStart(2,'0');
    if(timerEl)timerEl.textContent=`Window: ${m}:${s} remaining`;
    setTimeout(tick,1000);
  }
  tick();

  // Poll every 10s (USDT confirms slower than UPI; align with 20-min window)
  let pollCount=0, consecutiveErrors=0;
  const maxPolls=Math.ceil((r.window_minutes||20)*60/10);
  const timer=setInterval(async()=>{

      const el=document.getElementById('usdt-poll-status');

      return;

      consecutiveErrors=0;
      if(s.status==='paid'){
        clearInterval(timer);
        modalEl.remove();
        CUSTOMER=await api('/me').catch(()=>CUSTOMER);
        updateHeaderUI();
        showToast('Payment confirmed! Order placed.','success');
        goTab('orders');
      }else if(s.status==='expired'){
        clearInterval(timer);
        const el=document.getElementById('usdt-poll-status');
        if(el)el.innerHTML='⏱ Payment window expired.';
      }
    }catch(err){
      consecutiveErrors++;
      if(consecutiveErrors>=4){
        const el=document.getElementById('usdt-poll-status');
        if(el)el.innerHTML='⚠️ Connection issue checking status. Retrying… (your payment is still being watched server-side)';
      }
    }
  },10000);
}
