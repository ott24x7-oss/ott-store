<!DOCTYPE html>
<html lang="en" data-app="ott24x7">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#15171c">
<meta name="robots" content="noindex,nofollow">
<title>OTT24x7</title>
<link rel="manifest" href="/app.webmanifest">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OTT24x7">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ── Gold "liquid glass" mini-app design (ported from the OTT24x7 Telegram mini-app) ── */
  :root{
    /* Base — dark CHARCOAL canvas (not pure black) so neumorphic surfaces can
       extrude with both a light and a dark shadow. */
    --bg:#15171c; --bg2:#191c22; --card:#1b1e25; --card2:#20242c; --card3:#272b34;
    --line:rgba(255,255,255,.05); --line2:rgba(255,255,255,.1);
    --txt:#eef0f4; --muted:#9a9caa; --muted2:#5c5f6c;
    --g1:#f6c453; --g2:#f59e0b; --g3:#ea7a0c; --gold:#f59e0b; --gold-ink:#2a1a06;
    --gold-soft:rgba(245,158,11,.14); --gold-line:rgba(245,158,11,.55);
    --grad:linear-gradient(135deg,#fbbf24,#f59e0b);
    /* ── SKEUOMORPHISM — functional controls (buttons, pills, tabs): tactile,
       beveled, 3D-pressable with a bottom "edge" and an inner highlight. ── */
    --skeuo-gold:linear-gradient(180deg,#fdd884,#f7b840 48%,#ef9913);
    --skeuo-edge:#a9670a;
    --skeuo-dark:linear-gradient(180deg,#2f343d,#23272f);
    --skeuo-dark-edge:#0d0f13;
    --skeuo-hi:inset 0 1px 1px rgba(255,255,255,.55);
    /* ── NEUMORPHISM — background surfaces (cards, containers, inputs): soft UI
       extruded from the canvas with paired light/dark shadows. ── */
    --neu:#1b1e25; --neu-dark:rgba(0,0,0,.6); --neu-light:rgba(255,255,255,.05);
    --neu-out:-6px -6px 14px var(--neu-light),7px 7px 18px var(--neu-dark);
    --neu-out-sm:-3px -3px 8px var(--neu-light),4px 4px 11px var(--neu-dark);
    --neu-in:inset 4px 4px 9px var(--neu-dark),inset -4px -4px 9px var(--neu-light);
    /* ── GLASSMORPHISM — layers/overlays (header, nav, sheets, toolbars): frosted,
       translucent, blurred, thin light border + top sheen. ── */
    --glass:rgba(28,31,39,.58); --glass-line:rgba(255,255,255,.13);
    --glass-sh:0 14px 44px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.14);
    --neon:0 0 16px rgba(251,191,36,.5),0 0 36px rgba(245,158,11,.28);
    --green:#34d399; --green-soft:rgba(52,211,153,.15);
    --orange:#fbbf24; --orange-soft:rgba(251,191,36,.15);
    --red:#f87171; --red-soft:rgba(248,113,113,.15);
    --blue:#60a5fa; --blue-soft:rgba(96,165,250,.15);
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scrollbar-gutter:stable}
  body{
    font-family:"DM Sans",-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--txt);
    background:
      radial-gradient(130% 70% at 50% 112%, rgba(245,158,11,.10), transparent 60%),
      radial-gradient(90% 50% at 50% -6%, rgba(245,158,11,.05), transparent 55%),
      var(--bg);
    background-attachment:fixed;
    min-height:100vh;font-size:14px;line-height:1.5;overflow-x:hidden;-webkit-font-smoothing:antialiased;
  }
  .app{max-width:480px;margin:0 auto;padding:18px 16px 110px;min-height:100vh}
  .center{display:grid;place-items:center;min-height:60vh;text-align:center;color:var(--muted);padding:30px}
  .spin{width:34px;height:34px;border:3px solid rgba(255,255,255,.14);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite;margin:0 auto 14px}
  @keyframes sp{to{transform:rotate(360deg)}}
  .hidden{display:none!important}
  .kicker{font-size:11px;font-weight:700;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
  .kicker.gold{color:var(--g2)}
  .page-title{font-size:27px;font-weight:800;letter-spacing:-.02em;margin:4px 0 2px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .page-sub{color:var(--muted);font-size:13px;margin-bottom:18px}
  .sec-head{display:flex;align-items:center;justify-content:space-between;margin:22px 0 12px}
  .sec-head h2{font-size:18px;font-weight:800;letter-spacing:-.01em}
  .sec-head .link{background:none;border:0;color:var(--g2);font-weight:700;font-size:13px;cursor:pointer}
  .sec-head .count{color:var(--muted);font-size:13px;font-weight:600}
  /* NEUMORPHISM — soft extruded surface */
  .card{background:var(--neu);border:1px solid var(--line);border-radius:22px;box-shadow:var(--neu-out)}
  .pad{padding:18px}
  .glass{background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015));backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
  .home-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .avatar{width:46px;height:46px;border-radius:50%;flex:none;display:grid;place-items:center;background:var(--grad);color:var(--gold-ink);font-weight:900;font-size:19px;box-shadow:0 8px 22px rgba(245,158,11,.34),inset 0 1px 0 rgba(255,255,255,.4);position:relative}
  .avatar:after{content:"";position:absolute;right:1px;bottom:1px;width:11px;height:11px;border-radius:50%;background:var(--green);border:2px solid var(--card)}
  .hh-txt{flex:1;min-width:0}
  .hh-txt .k{font-size:10.5px;letter-spacing:.18em;color:var(--muted);font-weight:700;text-transform:uppercase}
  .hh-txt .n{font-size:19px;font-weight:800;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bal-pill{display:flex;align-items:center;gap:7px;background:var(--skeuo-gold);color:var(--gold-ink);border:0;border-radius:999px;padding:10px 16px;font-weight:800;font-size:14px;cursor:pointer;box-shadow:var(--skeuo-hi),0 4px 0 var(--skeuo-edge),0 9px 16px rgba(0,0,0,.4);flex:none;transition:transform .1s,box-shadow .1s}
  .bal-pill:active{transform:translateY(3px);box-shadow:var(--skeuo-hi),0 1px 0 var(--skeuo-edge),0 3px 7px rgba(0,0,0,.4)}
  .bal-pill svg{width:16px;height:16px}
  .search{display:flex;align-items:center;gap:10px;background:var(--neu);border:1px solid var(--line);border-radius:16px;padding:0 16px;height:50px;box-shadow:var(--neu-in);transition:box-shadow .2s}
  .search:focus-within{box-shadow:var(--neu-in),0 0 0 2px var(--gold-line)}
  .search svg{width:18px;height:18px;color:var(--muted);flex:none}
  .search input{flex:1;background:none;border:0;outline:none;color:var(--txt);font-size:14px;font-family:inherit}
  .search input::placeholder{color:var(--muted2)}
  .hero{position:relative;overflow:hidden;border-radius:22px;border:1px solid var(--gold-line);padding:22px 20px;min-height:128px;display:flex;flex-direction:column;justify-content:center;margin-top:16px;
    background:radial-gradient(120% 120% at 85% 0%, rgba(245,158,11,.42), transparent 55%), linear-gradient(135deg,#241a0c,#100d0a 70%);
    box-shadow:0 18px 44px rgba(0,0,0,.45),0 0 30px rgba(245,158,11,.16),inset 0 1px 0 rgba(255,255,255,.1)}
  .hero:after{content:"";position:absolute;top:0;left:0;width:55%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,228,170,.16),transparent);transform:translateX(-160%);animation:sheen 6s ease-in-out 1.2s infinite;pointer-events:none;z-index:1}
  .hero h3,.hero .hero-cta{position:relative;z-index:2}
  .hero h3{font-size:20px;font-weight:800;line-height:1.25;letter-spacing:-.01em;max-width:80%}
  .hero h3 b{color:var(--g1)}
  .hero .hero-ic{position:absolute;right:-10px;bottom:-14px;width:120px;height:120px;color:rgba(245,158,11,.16)}
  .pills{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 8px;scrollbar-width:none}
  .pills::-webkit-scrollbar{display:none}
  .pill{flex:none;display:inline-flex;align-items:center;gap:7px;background:var(--neu);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:10px 16px;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap;box-shadow:var(--neu-out-sm);transition:transform .12s var(--ease),box-shadow .15s,color .2s}
  .pill:active{transform:translateY(2px);box-shadow:var(--neu-in)}
  .pill.cat{gap:9px;padding:6px 17px 6px 6px}
  .pill.cat .pem{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:15px;line-height:1;flex:none;background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.32)}
  .pill.cat.active .pem{background:rgba(255,255,255,.32);border-color:transparent}
  .pill.active{background:var(--skeuo-gold);color:var(--gold-ink);border-color:transparent;box-shadow:var(--skeuo-hi),0 3px 0 var(--skeuo-edge),0 7px 13px rgba(0,0,0,.35)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .pcard{position:relative;border:1px solid var(--line);background:var(--neu);border-radius:18px;padding:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--neu-out-sm);transition:transform .2s var(--ease),box-shadow .2s var(--ease);animation:rise .5s var(--ease) both}
  #gridHost{animation:none}
  .pcard:active{transform:scale(.99);box-shadow:var(--neu-in)}
  .pcard .thumb{height:84px;border-radius:13px;background:linear-gradient(160deg,#fff,#e9edf4);display:grid;place-items:center;font-size:34px;overflow:hidden;margin-bottom:10px}
  .pcard .thumb img{width:100%;height:100%;object-fit:contain;padding:9px;box-sizing:border-box}
  .pcard .cat{font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--g2)}
  .pcard .nm{font-size:13px;font-weight:600;line-height:1.3;margin:3px 0 0;min-height:34px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .pcard .row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;gap:6px}
  .pcard .pr{font-size:16px;font-weight:800;color:var(--g1)}
  .pcard .add{width:36px;height:36px;flex:none;border:0;border-radius:12px;background:var(--skeuo-gold);color:var(--gold-ink);display:grid;place-items:center;cursor:pointer;font-size:19px;font-weight:800;box-shadow:var(--skeuo-hi),0 3px 0 var(--skeuo-edge),0 7px 13px rgba(0,0,0,.4);transition:transform .1s,box-shadow .1s}
  .pcard .add:active{transform:translateY(3px);box-shadow:var(--skeuo-hi),0 1px 0 var(--skeuo-edge),0 2px 6px rgba(0,0,0,.4)}
  .empty{border-radius:22px;padding:42px 24px;text-align:center;background:var(--neu);box-shadow:var(--neu-in);margin-top:6px}
  .empty .e-ic{width:74px;height:74px;border-radius:20px;display:grid;place-items:center;margin:0 auto 18px;background:var(--card3);color:var(--muted)}
  .empty .e-ic.gold{background:var(--grad);color:var(--gold-ink);box-shadow:0 14px 34px rgba(245,158,11,.34)}
  .empty .e-ic svg{width:34px;height:34px}
  .empty h3{font-size:19px;font-weight:800}
  .empty p{color:var(--muted);font-size:13px;margin:6px 0 18px;max-width:280px;margin-left:auto;margin-right:auto}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:999px;padding:14px 22px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;transition:transform .1s var(--ease),box-shadow .12s,filter .2s}
  .btn:active{transform:translateY(2px)}
  /* SKEUOMORPHISM — physical, beveled buttons; the 3D edge collapses on press */
  .btn-gold{background:var(--skeuo-gold);color:var(--gold-ink);box-shadow:var(--skeuo-hi),inset 0 -2px 3px rgba(150,80,0,.38),0 5px 0 var(--skeuo-edge),0 11px 18px rgba(0,0,0,.45)}
  .btn-gold:hover{filter:brightness(1.04)}
  .btn-gold:active{transform:translateY(4px);box-shadow:var(--skeuo-hi),0 1px 0 var(--skeuo-edge),0 3px 9px rgba(0,0,0,.4)}
  .btn-dark{background:var(--skeuo-dark);color:var(--txt);box-shadow:inset 0 1px 0 rgba(255,255,255,.09),0 4px 0 var(--skeuo-dark-edge),0 9px 16px rgba(0,0,0,.45)}
  .btn-dark:active{transform:translateY(4px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 1px 0 var(--skeuo-dark-edge),0 3px 8px rgba(0,0,0,.4)}
  .btn-block{width:100%}
  .btn svg{width:17px;height:17px}
  .wallet-card{position:relative;overflow:hidden;border-radius:22px;border:1px solid var(--gold-line);padding:20px;
    background:radial-gradient(120% 120% at 88% 8%, rgba(245,158,11,.26), transparent 52%), linear-gradient(160deg,#1a1710,#0e0d0b);
    box-shadow:0 20px 50px rgba(0,0,0,.55),0 0 34px rgba(245,158,11,.18),inset 0 1px 0 rgba(255,255,255,.1)}
  .wallet-card:after{content:"";position:absolute;top:0;left:-30%;width:45%;height:100%;background:linear-gradient(105deg,transparent,rgba(255,228,170,.14),transparent);transform:translateX(-120%);animation:sheen 7s ease-in-out 1.6s infinite;pointer-events:none}
  .wallet-card .lbl{font-size:10.5px;letter-spacing:.2em;color:var(--muted);font-weight:700;text-transform:uppercase}
  .wallet-card .bal{font-size:38px;font-weight:900;letter-spacing:-.02em;margin:2px 0 8px;color:#fff}
  .wbtns{display:flex;gap:9px;margin-top:14px}
  .wbtn{display:inline-flex;align-items:center;gap:6px;border:0;border-radius:999px;padding:12px 18px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;transition:transform .1s,box-shadow .1s}
  .wbtn svg{width:15px;height:15px}
  .wbtn.gold{background:var(--skeuo-gold);color:var(--gold-ink);box-shadow:var(--skeuo-hi),0 4px 0 var(--skeuo-edge),0 8px 15px rgba(0,0,0,.4)}
  .wbtn.gold:active{transform:translateY(3px);box-shadow:var(--skeuo-hi),0 1px 0 var(--skeuo-edge),0 3px 7px rgba(0,0,0,.4)}
  .wbtn.dark{background:var(--skeuo-dark);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 3px 0 var(--skeuo-dark-edge),0 7px 13px rgba(0,0,0,.4)}
  .wbtn.dark:active{transform:translateY(3px);box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 1px 0 var(--skeuo-dark-edge),0 3px 7px rgba(0,0,0,.4)}
  .sum-ic{position:absolute;right:18px;top:18px;width:52px;height:52px;border-radius:15px;background:var(--grad);color:var(--gold-ink);display:grid;place-items:center;box-shadow:0 10px 24px rgba(245,158,11,.34),inset 0 1px 0 rgba(255,255,255,.45)}
  .sum-ic svg{width:24px;height:24px}
  .row-item{display:flex;align-items:center;gap:12px;border:1px solid var(--line);background:var(--neu);border-radius:16px;padding:14px;margin-bottom:11px;box-shadow:var(--neu-out-sm)}
  .row-item .ri-ic{width:44px;height:44px;flex:none;border-radius:13px;background:linear-gradient(160deg,#fff,#e9edf4);color:#333;display:grid;place-items:center;overflow:hidden}
  .row-item .ri-ic img{width:100%;height:100%;object-fit:contain;padding:7px}
  .row-item .ri-ic svg{width:20px;height:20px;color:var(--g2)}
  .row-item .ri-mid{flex:1;min-width:0}
  .row-item .ri-mid .t{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row-item .ri-mid .s{color:var(--muted);font-size:12px;margin-top:2px}
  .row-item .ri-end{text-align:right;flex:none}
  .row-item .ri-end .a{font-weight:800;font-size:15px}
  .sbadge{display:inline-block;font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;letter-spacing:.03em;margin-top:4px}
  .sbadge.ok{background:var(--green-soft);color:var(--green)} .sbadge.pend{background:var(--gold-soft);color:var(--g1)} .sbadge.bad{background:var(--red-soft);color:var(--red)}
  .keys{margin-top:10px;background:#0b1411;border:1px solid rgba(55,211,154,.3);color:#bdf3da;border-radius:12px;padding:11px;font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap;word-break:break-all}
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;justify-content:center;padding:0 12px 14px;pointer-events:none}
  .nav-bar{pointer-events:auto;display:flex;justify-content:space-between;gap:2px;width:100%;max-width:456px;background:var(--glass);backdrop-filter:blur(26px) saturate(1.5);-webkit-backdrop-filter:blur(26px) saturate(1.5);border:1px solid var(--glass-line);border-radius:26px;padding:10px 8px;box-shadow:var(--glass-sh),0 -8px 34px rgba(0,0,0,.45)}
  .nav-item{flex:1;display:grid;justify-items:center;gap:5px;background:none;border:0;cursor:pointer;padding:0;font-family:inherit}
  .nav-item .ni-ic{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:var(--neu);color:var(--muted);box-shadow:var(--neu-out-sm);transition:.2s var(--ease)}
  .nav-item .ni-ic svg{width:21px;height:21px}
  .nav-item .ni-lb{font-size:10.5px;color:var(--muted);font-weight:600}
  .nav-item.active .ni-ic{background:var(--skeuo-gold);color:var(--gold-ink);box-shadow:var(--skeuo-hi),0 3px 0 var(--skeuo-edge),0 7px 13px rgba(0,0,0,.35);transform:translateY(-2px)}
  .nav-item.active .ni-lb{color:var(--g1);font-weight:800}
  .sheet{position:fixed;inset:0;z-index:80;background:rgba(4,4,6,.66);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .28s var(--ease)}
  .sheet.show{opacity:1;pointer-events:auto}
  .sheet .panel{width:100%;max-width:480px;margin:0 auto;background:var(--glass);backdrop-filter:blur(30px) saturate(1.5);-webkit-backdrop-filter:blur(30px) saturate(1.5);border:1px solid var(--glass-line);border-bottom:0;border-radius:28px 28px 0 0;padding:12px 16px calc(16px + env(safe-area-inset-bottom));max-height:92vh;overflow:auto;transform:translateY(101%);transition:transform .36s var(--ease);box-shadow:0 -24px 60px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.14)}
  .sheet .panel:before{content:"";display:block;width:40px;height:4px;border-radius:999px;background:rgba(255,255,255,.2);margin:0 auto 14px}
  .sheet.show .panel{transform:none}
  .d-head{display:flex;align-items:center;gap:13px;margin-bottom:12px}
  .d-ic{flex:none;width:60px;height:60px;border-radius:15px;background:linear-gradient(160deg,#fff,#e9edf4);display:grid;place-items:center;font-size:30px;overflow:hidden}
  .d-ic img{max-width:100%;max-height:60px;object-fit:contain;padding:9px;box-sizing:border-box}
  .d-txt{flex:1;min-width:0}
  .d-nm{font-size:16px;font-weight:800;line-height:1.2}
  .d-pr{font-size:20px;font-weight:900;color:var(--g1);margin-top:3px}
  .meta{display:grid;gap:7px;margin:8px 0 12px;font-size:13px}
  .meta .m{display:flex;justify-content:space-between;gap:12px;background:var(--neu);border-radius:12px;padding:10px 13px;box-shadow:var(--neu-in)}
  .meta .m span:first-child{color:var(--muted)}
  .desc{font-size:12.5px;line-height:1.5;color:#cfcdc6;background:var(--neu);border-radius:12px;padding:12px 14px;box-shadow:var(--neu-in);display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden}
  .toast{position:fixed;left:50%;bottom:120px;transform:translateX(-50%) translateY(70px);z-index:120;background:var(--glass);backdrop-filter:blur(20px) saturate(1.4);-webkit-backdrop-filter:blur(20px) saturate(1.4);border:1px solid var(--glass-line);color:#fff;padding:13px 20px;border-radius:15px;font-weight:600;box-shadow:var(--glass-sh);transition:.28s var(--ease);max-width:88%;opacity:0;visibility:hidden}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;visibility:visible}
  @keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes goldShimmer{0%{background-position:0% 50%}100%{background-position:230% 50%}}
  .bal-pill,.btn-gold,.wbtn.gold,.pill.active,.add,.nav-item.active .ni-ic,.sum-ic,.e-ic.gold,.avatar{background-size:230% 100%;filter:drop-shadow(0 0 9px rgba(251,191,36,.42)) drop-shadow(0 0 20px rgba(245,158,11,.2))}
  .bal-pill,.btn-gold,.wbtn.gold,.nav-item.active .ni-ic,.sum-ic,.pill.active{animation:goldShimmer 4.6s linear infinite}

  function svg(name){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[name]||'')+'</svg>';}
  function toast(m){var t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2600);}
  function copyText(x){try{navigator.clipboard.writeText(x);toast('Copied');}catch(e){toast(String(x));}}
  function csrf(){var m=document.cookie.match(/csrfToken=([^;]+)/);return m?decodeURIComponent(m[1]):'';}

  function api(path,opts){
    opts=opts||{};
    var headers={'Content-Type':'application/json'};
    if((opts.method||'GET').toUpperCase()!=='GET'){var t=csrf();if(t)headers['X-CSRF-Token']=t;}
    var ctrl=new AbortController();var to=setTimeout(function(){ctrl.abort();},15000);
    return fetch('/user/api'+path,{method:opts.method||'GET',credentials:'include',headers:headers,body:opts.body,signal:ctrl.signal})
      .then(function(r){return r.json().then(function(j){return {ok:r.ok,status:r.status,data:j};},function(){return {ok:r.ok,status:r.status,data:{}};});})
      .finally(function(){clearTimeout(to);});
  }

      : '🛍';

  /* ── boot ── (load /store first so the auth screen knows wa_enabled + name) */
  function boot(){
    api('/store').then(function(r){ if(r.ok){STATE.store=r.data; if(r.data&&r.data.site_name)document.title=r.data.site_name; setSplashLogo();} },function(){})
      .then(function(){ return api('/me'); })
      .then(function(r){
        if(r&&r.ok && r.data && !r.data.error){ STATE.user=r.data; loadData(); }
        else { renderLogin(); hideSplash(); }
      }).catch(function(){ renderLogin(); hideSplash(); });
  }
  function hideSplash(){ var s=$('splash'); if(s){ s.classList.add('hide'); setTimeout(function(){ if(s) s.remove(); maybeOnboard(); },600); } else { maybeOnboard(); } }
  // App logo: prefer an app-only logo (logo_app_url), else the website dark logo. Swapped in once /store loads.
  function setSplashLogo(){
    try{
      var lg=(STATE.store&&(STATE.store.logo_app_url||STATE.store.logo_dark_url))||'';
      var im=document.querySelector('#splash .sp-logo img'); if(!im||!lg) return;
      im.style.display='block'; im.src=lg;
      var w=im.nextElementSibling; if(w) w.style.display='none';
    }catch(e){}
  }

  function loadData(){
    Promise.all([api('/plans'), api('/wallet').catch(function(){return{ok:false};}), api('/orders').catch(function(){return{ok:false};})]).then(function(res){
      var plans=(res[0].ok && Array.isArray(res[0].data))?res[0].data:[];
      STATE.products=plans.map(function(p){return {
        id:p.id, slug:p.slug, name:p.name, price:p.price_inr, original:p.original_price_inr,
        category:p.platform||'Other', logo:p.image_url||'', description:p.description||'',
        duration:p.duration_days, delivery:p.delivery_type, features:p.features||[], stock:p.stock
      };});
      if(res[1] && res[1].ok && res[1].data) STATE.balance=res[1].data.balance||0;
      if(res[2] && res[2].ok && Array.isArray(res[2].data)) STATE.orders=res[2].data;
      renderNav(); $('navWrap').classList.remove('hidden'); render(); hideSplash();
    }).catch(function(){ $('app').innerHTML='<div class="center">⚠️ Network error. Pull to refresh.</div>'; hideSplash(); });
  }

    method=method||'otp';

      '<div style="min-height:90vh;display:flex;flex-direction:column;justify-content:center;max-width:400px;margin:0 auto">'
      +'<div class="auth-logo">'+esc(name.charAt(0).toUpperCase())+'</div>'

      +'<div class="am-tabs">'
        +'<button class="am-tab'+(method==='otp'?' on':'')+'" data-m="otp">📱 OTP</button>'

  function setMethod(m){

  /* OTP (default, passwordless — auto-creates account) */
  function renderOtp(a){
    a.innerHTML=
      '<div id="otp1"><div id="otpe1" class="alert err" style="display:none"></div>'
        +'<div class="field"><label>Email address</label><input id="otpEmail" type="email" inputmode="email" autocomplete="email" placeholder="you@email.com" value="'+esc(lastEmail())+'"></div>'
        +'<button class="btn btn-gold btn-block" id="otpSendBtn">Send OTP '+svg('arrow')+'</button>'
        +'<p style="text-align:center;font-size:.78rem;color:var(--muted);margin-top:10px">New here? An account is created automatically.</p></div>'
      +'<div id="otp2" style="display:none"><div id="otpe2" class="alert err" style="display:none"></div>'
        +'<p style="text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:10px">Enter the 6-digit code sent to <b id="otpEd" style="color:var(--g1)"></b></p>'

        +'<button class="btn btn-gold btn-block" id="otpVerifyBtn" style="margin-top:12px">Verify &amp; Sign in</button>'
        +'<p style="text-align:center;font-size:.8rem;color:var(--muted);margin-top:12px"><span id="otpBack" style="color:var(--g1);cursor:pointer">Change email</span> · <span id="otpResend" style="color:var(--g1);cursor:pointer">Resend code</span></p></div>';

    $('otpResend').onclick=function(){ otpSend(true); };
    $('otpEmail').onkeydown=function(e){ if(e.key==='Enter') otpSend(); };
    $('otpCode').onkeydown=function(e){ if(e.key==='Enter') otpVerify(); };
  }
  function otpSend(resend){
    var email=($('otpEmail')?$('otpEmail').value:lastEmail()).trim();
    if(!email){ authErr('otpe1','Please enter your email.'); return; }
    var btn=$('otpSendBtn'); if(btn){btn.disabled=true;btn.textContent='Sending…';}
    api('/send-otp',{method:'POST',body:JSON.stringify({email:email})}).then(function(r){
      if(btn){btn.disabled=false;btn.innerHTML='Send OTP '+svg('arrow');}
      if(r.ok){ try{localStorage.setItem('app_last_email',email);}catch(e){} $('otp1').style.display='none'; $('otp2').style.display=''; $('otpEd').textContent=email; setTimeout(function(){var c=$('otpCode');if(c)c.focus();},100); if(resend) toast('New code sent'); }
      else authErr('otpe1',(r.data&&r.data.error)||'Could not send code.');
    }).catch(function(){ if(btn){btn.disabled=false;btn.innerHTML='Send OTP '+svg('arrow');} authErr('otpe1','Network error.'); });
  }
  function otpVerify(){
    var email=lastEmail(), otp=($('otpCode')?$('otpCode').value:'').trim();
    if(!otp){ authErr('otpe2','Enter the 6-digit code.'); return; }
    var btn=$('otpVerifyBtn'); if(btn){btn.disabled=true;btn.textContent='Verifying…';}
    api('/verify-otp',{method:'POST',body:JSON.stringify({email:email,otp:otp})}).then(function(r){
      if(r.ok && (!r.data||!r.data.error)){ toast('Signed in'); boot(); }
      else { if(btn){btn.disabled=false;btn.textContent='Verify & Sign in';} authErr('otpe2',(r.data&&r.data.error)||'Invalid code.'); }
    }).catch(function(){ if(btn){btn.disabled=false;btn.textContent='Verify & Sign in';} authErr('otpe2','Network error.'); });
  }

      +'<div class="pay-field"><div class="pf-l">'+esc(addrLabel)+' — tap to copy</div><button class="pf-copy" data-copy="'+esc(d.address)+'"><span class="v">'+esc(d.address)+'</span><span class="ic">'+svg('copy')+'</span></button></div>'
      +'<div class="pay-field"><div class="pf-l">Exact amount — tap to copy</div><button class="pf-copy" data-copy="'+amt.toFixed(3)+'"><span class="v">'+amt.toFixed(3)+' USDT</span><span class="ic">'+svg('copy')+'</span></button></div>'
      +'<div class="pay-wait" id="payWait"><div class="spin"></div><span>Waiting for your transfer…</span></div>'
      +'<button class="btn btn-dark btn-block" onclick="closeSheet()">I’ll pay later</button>'
    );
    wirePoll(d.topup_id,p);
  }

  /* Wallet (pay from balance — instant) */
  function payWallet(p, phone){
    loadingSheet('Paying from wallet…');
    var body={plan_id:p.id}; if(phone) body.phone=phone;
    api('/checkout/wallet',{method:'POST',body:JSON.stringify(body)}).then(function(r){
      if(r.data && r.data.need_phone) return askPhone(function(ph){ payWallet(p,ph); });
      if(r.ok && r.data && r.data.ok){ if(r.data.new_balance!=null) STATE.balance=r.data.new_balance; paySuccess(r.data.order||{id:r.data.order_id},p); }
      else openSheet(payErr((r.data&&r.data.error)||'Could not pay from wallet.'));
    }).catch(function(){ openSheet(payErr('Network error. Try again.')); });
  }

  function paySuccess(order,p){
    STATE.page='orders';
    openSheet('<div class="pay-done"><div class="pd-ic">'+svg('check')+'</div><div class="pd-t">Payment received 🎉</div><div class="page-sub" style="margin-bottom:0">Your order for <b style="color:var(--g1)">'+esc(p.name)+'</b> is placed. Credentials arrive on WhatsApp + email shortly.</div><button class="btn btn-gold btn-block" id="okBtn" style="margin-top:14px">View my orders '+svg('arrow')+'</button></div>');
    $('okBtn').onclick=function(){ closeSheet(); go('orders'); renderNav(); };
    loadOrders();
  }

  /* ── PWA: service worker + install GATE (mobile browser, not installed) ── */
  if('serviceWorker' in navigator){ try{ navigator.serviceWorker.register('/sw.js',{scope:'/'}); }catch(e){} }
  var deferredPrompt=null;
  // Running inside the installed native (Capacitor) app? Detected via the custom
  // user-agent tag (appendUserAgent), the Capacitor bridge, or a ?native=1 flag.
  function isNativeApp(){ try{
    if(/OTT24x7App/i.test(navigator.userAgent)) return true;
    if(/[?&]native=1\b/.test(location.search)) return true;
    var C=window.Capacitor; if(C && (typeof C.isNativePlatform==='function' ? C.isNativePlatform() : C.isNative)) return true;
  }catch(e){} return false; }
  function isStandalone(){ try{ return isNativeApp() || window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true; }catch(e){ return isNativeApp(); } }
  function isiOS(){ return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream; }
  function isMobileDevice(){ return /android|iphone|ipad|ipod|mobile|silk|kindle/i.test(navigator.userAgent); }
  function gateSkipped(){ try{ return sessionStorage.getItem('app_gate_skip')==='1'; }catch(e){ return false; } }
  function doInstall(){
    if(deferredPrompt){ var dp=deferredPrompt; deferredPrompt=null; dp.prompt(); dp.userChoice.then(function(c){ if(c&&c.outcome==='accepted') toast('Installing…'); }); return; }
    if(isiOS()){ iosInstallSheet(); return; }
    toast('Open your browser menu → Install / Add to Home Screen');
  }
  function iosInstallSheet(){
    openSheet('<div class="pd-t" style="font-size:20px">Add to Home Screen</div>'
      +'<div class="page-sub" style="margin-bottom:14px">Install OTT24x7 on your iPhone:</div>'
      +'<div class="meta"><div class="m"><span>1 · Tap the <b style="color:var(--g1)">Share</b> button</span><span>⬆️</span></div>'
        +'<div class="m"><span>2 · Choose <b style="color:var(--g1)">Add to Home Screen</b></span><span>➕</span></div>'
        +'<div class="m"><span>3 · Tap <b style="color:var(--g1)">Add</b></span><span>✓</span></div></div>'
      +'<button class="btn btn-gold btn-block" style="margin-top:14px" onclick="closeSheet()">Got it</button>');
  }
  function gateAction(){
    if(isiOS()){
      return '<div class="ig-steps">'
        +'<div class="ig-step"><span class="n">1</span><div>Tap the <b>Share</b> button <span class="emo">⬆️</span> in the toolbar</div></div>'
        +'<div class="ig-step"><span class="n">2</span><div>Choose <b>Add to Home Screen</b> <span class="emo">➕</span></div></div>'
        +'<div class="ig-step"><span class="n">3</span><div>Tap <b>Add</b>, then open OTT24x7 from your home screen</div></div>'
      +'</div>';
    }
    return '<button class="btn btn-gold btn-block" id="igInstall">'+svg('download')+'Install App</button>'
      +'<div style="font-size:11.5px;color:var(--muted);text-align:center;margin-top:9px">One tap · adds to your home screen</div>';
  }
  function showGate(){
    var g=$('installgate'); if(!g) return;
    var B=[['bolt','Instant ordering & delivery'],['wallet','Wallet & 1-tap top-up'],['bell','Order updates & offers']];
    $('igBenefits').innerHTML=B.map(function(b){ return '<li><span class="bi">'+svg(b[0])+'</span>'+esc(b[1])+'</li>'; }).join('');
    $('igAction').innerHTML=gateAction();
    var apk=$('igApk'); if(apk){ if(isiOS()) apk.classList.add('hidden'); else apk.classList.remove('hidden'); }
    g.classList.remove('hidden'); document.body.style.overflow='hidden';
    var ib=$('igInstall'); if(ib) ib.onclick=doInstall;
    $('igSkip').onclick=function(){ try{ sessionStorage.setItem('app_gate_skip','1'); }catch(e){} g.classList.add('hidden'); document.body.style.overflow=''; };
  }
  function maybeGate(){
    var force=/[?&]gate=1/.test(location.search);
    if(!force && (isStandalone() || !isMobileDevice() || gateSkipped())) return;
    showGate();
  }
  window.addEventListener('beforeinstallprompt',function(e){ e.preventDefault(); deferredPrompt=e; });
  window.addEventListener('appinstalled',function(){ var g=$('installgate'); if(g) g.classList.add('hidden'); document.body.style.overflow=''; toast('App installed 🎉'); });
  maybeGate();

  /* ── first-launch onboarding (intro slides) ── */
  var OB=[
    {ic:'spark', t:'Welcome to <b>OTT24x7</b>', p:'Premium OTT, AI tools &amp; software subscriptions — at India\'s best prices.'},
    {ic:'box', t:'200+ Premium Services', p:'Netflix, Prime, Spotify, ChatGPT, Windows &amp; more — 100% genuine, instant delivery.'},
    {ic:'bolt', t:'Fast, Secure &amp; 24×7', p:'Pay by UPI, USDT or Wallet. Instant delivery and round-the-clock WhatsApp support.'}
  ];
  var obIdx=0;
  function onboarded(){ try{ return localStorage.getItem('app_onboarded')==='1'; }catch(e){ return false; } }
  function finishOnboard(){ try{ localStorage.setItem('app_onboarded','1'); }catch(e){} var o=$('onboard'); if(o) o.classList.add('hidden'); document.body.style.overflow=''; }
  function obGo(i){
    obIdx=Math.max(0,Math.min(OB.length-1,i));
    var t=$('obTrack'); if(t) t.style.transform='translateX(-'+(obIdx*100)+'%)';
    [].forEach.call($('obDots').children,function(d,j){ d.classList.toggle('on',j===obIdx); });
    $('obNext').textContent=(obIdx===OB.length-1)?'Get Started':'Next';
  }
  function showOnboard(){
    var o=$('onboard'); if(!o || !o.classList.contains('hidden')) return;
    $('obTrack').innerHTML=OB.map(function(s){ return '<div class="ob-slide"><div class="ob-illus">'+svg(s.ic)+'</div><h2>'+s.t+'</h2><p>'+s.p+'</p></div>'; }).join('');
    $('obDots').innerHTML=OB.map(function(_,j){ return '<i class="'+(j===0?'on':'')+'"></i>'; }).join('');
    obIdx=0; obGo(0);
    o.classList.remove('hidden'); document.body.style.overflow='hidden';
    $('obNext').onclick=function(){ if(obIdx<OB.length-1) obGo(obIdx+1); else finishOnboard(); };
    $('obSkip').onclick=finishOnboard; $('obLogin').onclick=finishOnboard;
    var sx=0; o.ontouchstart=function(e){ sx=e.touches[0].clientX; }; o.ontouchend=function(e){ var dx=e.changedTouches[0].clientX-sx; if(Math.abs(dx)>50) obGo(obIdx+(dx<0?1:-1)); };
  }
  function maybeOnboard(){
    var force=/[?&]onboard=1/.test(location.search);
    if(!force){
      if(onboarded()) return;
      var g=$('installgate'); if(g && !g.classList.contains('hidden')) return; // don't stack on the install gate
    }
    showOnboard();
  }

  boot();
  setTimeout(function(){ var s=$('splash'); if(s&&!s.classList.contains('hide')) hideSplash(); }, 6000);
})();
</script>
</body>
</html>
