<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Admin — OTT Store</title>
<link rel="stylesheet" href="/style.css">
<style>
/* ── Admin layout — Liquid Glass ── */
.admin-wrap { display: flex; height: 100dvh; overflow: hidden; }
.icon { width: 1.15rem; height: 1.15rem; flex-shrink: 0; stroke-width: 1.85; }

/* Sidebar — frosted glass with gradient brand edge */
.sidebar {
  width: 248px; flex-shrink: 0; position: relative;
  background: var(--header-bg);
  backdrop-filter: blur(18px) saturate(140%); -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
  transition: width .22s cubic-bezier(.4,0,.2,1);
}
.sidebar::before { content:''; position:absolute; inset:0 auto 0 0; width:3px; background:linear-gradient(180deg,var(--grad-1),var(--grad-2),var(--grad-3)); opacity:.9; }
.sidebar.collapsed { width: 64px; }
.sidebar-header {
  padding: 1rem .95rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.sidebar-logo { display:flex; align-items:center; gap:.5rem; font-size: 1.05rem; font-weight: 900; white-space: nowrap; overflow: hidden;
  background: linear-gradient(135deg,var(--grad-1),var(--grad-3)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
.sidebar-logo .icon { color: var(--grad-1); width:1.35rem; height:1.35rem; }
.sidebar.collapsed .sidebar-logo span, .sidebar.collapsed .menu-label, .sidebar.collapsed .menu-group-title { display: none; }
.collapse-btn { background: none; border: none; color: var(--muted); cursor: pointer; display:inline-flex; align-items:center; justify-content:center; padding:.32rem; border-radius:9px; transition:background .15s, color .15s; }
.collapse-btn:hover { color: var(--text); background: rgba(99,102,241,.1); }

.menu-group { padding: .35rem .55rem; }
.menu-group-title { font-size: .64rem; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); opacity:.65; padding: .5rem .55rem .2rem; white-space: nowrap; }
.menu-item {
  display: flex; align-items: center; gap: .65rem; position: relative;
  padding: .55rem .65rem; margin: 1px 0; cursor: pointer; border-radius: 10px;
  color: var(--muted); font-size: .875rem; font-weight: 500;
  transition: background .15s, color .15s, transform .1s; white-space: nowrap; overflow: hidden;
}
.menu-item:hover { background: rgba(99,102,241,.08); color: var(--text); }
.menu-item:active { transform: scale(.98); }
.menu-item.active {
  color: var(--text); font-weight: 700;
  background: linear-gradient(135deg, rgba(99,102,241,.18), rgba(139,92,246,.08));
  box-shadow: inset 0 0 0 1px rgba(99,102,241,.28);
}
.menu-item.active::before { content:''; position:absolute; left:-.55rem; top:50%; transform:translateY(-50%); width:3px; height:58%; border-radius:0 3px 3px 0; background:linear-gradient(var(--grad-1),var(--grad-2)); }
.menu-icon { font-size: 1.02rem; flex-shrink: 0; width:1.35rem; text-align:center; filter: saturate(1.1); }
.menu-label { flex: 1; }

/* Top bar — glass */
.admin-topbar {
  height: 58px; flex-shrink: 0; position: relative; z-index: 5;
  background: var(--header-bg); backdrop-filter: blur(18px) saturate(140%); -webkit-backdrop-filter: blur(18px) saturate(140%);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.25rem; gap: 1rem;
}
.topbar-title { font-size: 1.05rem; font-weight: 800; letter-spacing:-.01em; }
.topbar-right { display: flex; align-items: center; gap: .55rem; }
.topbar-right .btn { gap:.4rem; }
.topbar-right .icon { width:1rem; height:1rem; }

/* Main */
.admin-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.admin-main { flex: 1; overflow-y: auto; padding: 1.6rem; animation: viewIn .34s cubic-bezier(.22,1,.36,1); }
@keyframes viewIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform:none; } }

/* Stat cards — glass with gradient top accent + hover lift */
.stat-row { display: grid; grid-template-columns: repeat(auto-fit,minmax(168px,1fr)); gap: 1rem; margin-bottom: 1.6rem; }
.stat-box { padding: 1.15rem 1.3rem; position: relative; overflow: hidden; transition: transform .2s ease, box-shadow .2s ease; }
.stat-box::before { content:''; position:absolute; inset:0 0 auto 0; height:3px; background:linear-gradient(90deg,var(--grad-1),var(--grad-2)); }
.stat-box:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.stat-box-label { font-size: .72rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .35rem; }
.stat-box-value { font-size: 1.7rem; font-weight: 900; letter-spacing:-.02em; font-variant-numeric: tabular-nums; }
.stat-box-sub { font-size: .74rem; color: var(--muted); margin-top: .15rem; }

/* Admin-scoped polish on shared components (this file loads after style.css) */
.btn { transition: transform .12s ease, filter .15s ease, box-shadow .15s ease, background .15s ease; }
.btn:active { transform: scale(.97); }
.btn-primary { box-shadow: 0 6px 18px rgba(99,102,241,.28); }
.btn:focus-visible, .menu-item:focus-visible, .form-input:focus-visible { outline: 2px solid var(--grad-1); outline-offset: 2px; }
.form-input:focus { box-shadow: 0 0 0 3px rgba(99,102,241,.18); }
.card { transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; }

/* Inline form layout */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

/* Feature tags */
.feature-tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .4rem; }
.feature-tag {
  display: flex; align-items: center; gap: .3rem;
  background: var(--blue-bg); color: var(--blue); border-radius: 20px;
  padding: .2rem .6rem; font-size: .78rem; font-weight: 600;
}
.feature-tag button { background: none; border: none; color: inherit; cursor: pointer; font-size: .9rem; line-height: 1; }

/* Toggle switch */
.toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform .2s cubic-bezier(.4,0,.2,1); box-shadow:0 1px 3px rgba(0,0,0,.3); }
input:checked + .toggle-slider { background: linear-gradient(135deg,var(--grad-1),var(--grad-2)); }
input:checked + .toggle-slider::before { transform: translateX(20px); }

/* Pending badge */
.pending-dot {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--red); color: #fff; border-radius: 50%;
  width: 18px; height: 18px; font-size: .65rem; font-weight: 800;
  margin-left: .3rem; box-shadow: 0 0 0 2px var(--card), 0 2px 6px rgba(220,38,38,.4);
}

/* Custom scrollbars */
.sidebar::-webkit-scrollbar, .admin-main::-webkit-scrollbar { width: 10px; }
.sidebar::-webkit-scrollbar-thumb, .admin-main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
.sidebar::-webkit-scrollbar-thumb:hover, .admin-main::-webkit-scrollbar-thumb:hover { background: var(--muted); background-clip: padding-box; }

/* Mobile sidebar overlay */
.sidebar-overlay { display: none; }
@media (max-width: 900px) {
  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; z-index: 200; transform: translateX(-100%); transition: transform .24s cubic-bezier(.4,0,.2,1); }
  .sidebar.mobile-open { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,.45); }
  .sidebar-overlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(2px); z-index: 199; }
  .admin-main { padding: 1rem; }
}

@media (prefers-reduced-motion: reduce) {
  .admin-main, .menu-item, .stat-box, .btn, .card, .toggle-slider::before { animation: none !important; transition: none !important; }
  .btn:active, .menu-item:active { transform: none; }
}
</style>
</head>
<body>
<script>
(function(){
  var t = document.documentElement.getAttribute('data-theme') || localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

<div class="admin-wrap" id="admin-wrap">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7.5" height="7.5" rx="1.6"/><rect x="13.5" y="3" width="7.5" height="7.5" rx="1.6"/><rect x="3" y="13.5" width="7.5" height="7.5" rx="1.6"/><rect x="13.5" y="13.5" width="7.5" height="7.5" rx="1.6"/></svg><span>Admin</span></span>
      <button class="collapse-btn" id="collapse-btn" title="Collapse" aria-label="Collapse sidebar"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
    </div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <div class="admin-body">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:.75rem;min-width:48px">
        <button class="collapse-btn" id="mobile-menu-btn" style="display:none" aria-label="Open menu"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      </div>
      <span class="topbar-title" id="topbar-title" style="position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap">Dashboard</span>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" id="theme-toggle">🌙</button>
        <a href="/" target="_blank" class="btn btn-secondary btn-sm"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5 4.6 4h14.8L21 9.5M4.2 9.5V19a1 1 0 0 0 1 1h13.6a1 1 0 0 0 1-1V9.5"/><path d="M9 20v-5.5h6V20"/></svg> View Store</a>
        <button class="btn btn-red btn-sm" id="admin-logout-btn">Logout</button>
      </div>
    </header>
    <main class="admin-main" id="admin-main">
      <div class="spinner"></div>
    </main>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" style="display:none"></div>

<script src="/admin/app.js"></script>
</body>
</html>
