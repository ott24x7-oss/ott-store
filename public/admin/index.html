<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — OTT Store</title>
<link rel="stylesheet" href="/style.css">
<style>
/* ── Admin layout ── */
.admin-wrap { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 240px; flex-shrink: 0;
  background: var(--card); border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow-y: auto; transition: width .2s;
}
.sidebar.collapsed { width: 60px; }
.sidebar-header {
  padding: 1rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.sidebar-logo { font-size: 1rem; font-weight: 900; color: var(--text); white-space: nowrap; overflow: hidden; }
.sidebar.collapsed .sidebar-logo { display: none; }
.sidebar.collapsed .menu-label { display: none; }
.sidebar.collapsed .menu-group-title { display: none; }
.collapse-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; flex-shrink: 0; }

.menu-group { padding: .5rem 0; }
.menu-group-title {
  font-size: .68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--muted); padding: .4rem .9rem .2rem; white-space: nowrap;
}
.menu-item {
  display: flex; align-items: center; gap: .6rem;
  padding: .5rem .9rem; cursor: pointer; border-radius: 0;
  color: var(--muted); font-size: .875rem; font-weight: 500;
  transition: all .12s; white-space: nowrap; overflow: hidden;
  border-left: 3px solid transparent;
}
.menu-item:hover { background: rgba(99,102,241,.06); color: var(--text); }
.menu-item.active { background: rgba(99,102,241,.1); color: var(--grad-1); border-left-color: var(--grad-1); font-weight: 700; }
.menu-icon { font-size: 1rem; flex-shrink: 0; }
.menu-label { flex: 1; }

/* Top bar */
.admin-topbar {
  height: 54px; flex-shrink: 0;
  background: var(--header-bg); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 1.25rem; gap: 1rem;
}
.topbar-title { font-size: 1rem; font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: .75rem; }

/* Main */
.admin-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.admin-main { flex: 1; overflow-y: auto; padding: 1.5rem; }

/* Stat cards row */
.stat-row { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.stat-box { padding: 1.1rem 1.25rem; }
.stat-box-label { font-size: .75rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .3rem; }
.stat-box-value { font-size: 1.6rem; font-weight: 900; }
.stat-box-sub { font-size: .75rem; color: var(--muted); margin-top: .1rem; }

/* Inline form layout */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }

/* Feature tags */
.feature-tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: .4rem; }
.feature-tag {
  display: flex; align-items: center; gap: .3rem;
  background: var(--blue-bg); color: var(--blue); border-radius: 20px;
  padding: .2rem .6rem; font-size: .78rem; font-weight: 600;
}
.feature-tag button { background: none; border: none; color: inherit; cursor: pointer; font-size: .9rem; line-height: 1; }

/* Toggle switch */
.toggle-switch { position: relative; display: inline-block; width: 42px; height: 24px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0; background: var(--border); border-radius: 24px;
  cursor: pointer; transition: .2s;
}
.toggle-slider::before {
  content: ''; position: absolute; width: 18px; height: 18px;
  left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s;
}
input:checked + .toggle-slider { background: var(--grad-1); }
input:checked + .toggle-slider::before { transform: translateX(18px); }

/* Pending badge */
.pending-dot {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--red); color: #fff; border-radius: 50%;
  width: 18px; height: 18px; font-size: .65rem; font-weight: 800;
  margin-left: .3rem;
}

/* Mobile sidebar overlay */
.sidebar-overlay { display: none; }
@media (max-width: 900px) {
  .sidebar { position: fixed; top: 0; left: 0; bottom: 0; z-index: 200; transform: translateX(-100%); transition: transform .22s; }
  .sidebar.mobile-open { transform: translateX(0); }
  .sidebar-overlay { display: block; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 199; }
  .admin-main { padding: 1rem; }
}
</style>
</head>
<body>
<script>
(function(){
  var t = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', t);
})();
</script>

<div class="admin-wrap" id="admin-wrap">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">⚙️ Admin</span>
      <button class="collapse-btn" id="collapse-btn" title="Collapse">◀</button>
    </div>
    <nav id="sidebar-nav"></nav>
  </aside>

  <div class="admin-body">
    <header class="admin-topbar">
      <div style="display:flex;align-items:center;gap:.75rem;min-width:48px">
        <button class="collapse-btn" id="mobile-menu-btn" style="font-size:1.3rem;display:none">☰</button>
      </div>
      <span class="topbar-title" id="topbar-title" style="position:absolute;left:50%;transform:translateX(-50%);white-space:nowrap">Dashboard</span>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" id="theme-toggle">🌙</button>
        <a href="/" target="_blank" class="btn btn-secondary btn-sm">🏪 View Store</a>
        <button class="btn btn-red btn-sm" id="admin-logout-btn">Logout</button>
      </div>
    </header>
    <main class="admin-main" id="admin-main">
      <div class="spinner"></div>
    </main>
  </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" style="display:none"></div>

<script src="/admin/app.js"></script>
</body>
</html>
