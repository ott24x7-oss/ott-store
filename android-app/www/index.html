<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>OTT24x7</title>
<style>
  :root{--grad:linear-gradient(135deg,#fbbf24,#f59e0b)}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;overflow:hidden;
    background:radial-gradient(120% 90% at 50% 38%,#1c1305 0%,#120c03 48%,#050402 80%);
    color:#f4f5f7;font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:grid;place-items:center;text-align:center;padding:24px}
  .aura{position:fixed;border-radius:50%;filter:blur(48px);opacity:.5;pointer-events:none}
  .aura.a1{width:340px;height:340px;background:radial-gradient(circle,#d97706,transparent 70%);top:-70px;left:-50px;animation:d1 9s ease-in-out infinite}
  .aura.a2{width:300px;height:300px;background:radial-gradient(circle,#92560a,transparent 70%);bottom:-60px;right:-40px;animation:d2 11s ease-in-out infinite}
  .wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:24px}
  .badge{position:relative;display:grid;place-items:center;animation:pop 1s cubic-bezier(.2,1.3,.3,1) both}
  .halo{position:absolute;inset:-30px;border-radius:50%;background:radial-gradient(circle,rgba(245,158,11,.45),transparent 65%);animation:glow 2.4s ease-in-out infinite}
  .ring{position:absolute;inset:-12px;border-radius:22px;filter:blur(2px);opacity:.9;
    background:conic-gradient(from 0deg,transparent 0%,transparent 32%,rgba(251,191,36,.6),rgba(217,119,6,.6),transparent 72%);
    animation:spin 3.2s linear infinite}
  .logo{position:relative;z-index:3;border-radius:18px;overflow:hidden;background:rgba(10,8,4,.92);
    padding:26px 36px;font-size:32px;font-weight:900;letter-spacing:.5px;color:#fff;
    box-shadow:0 0 0 1px rgba(255,255,255,.08),0 24px 70px rgba(245,158,11,.45)}
  .logo b{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .logo:after{content:"";position:absolute;inset:0;
    background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.35) 50%,transparent 62%);
    transform:translateX(-130%);animation:sheen 2.8s ease-in-out 1s infinite}
  .brand{font-size:12.5px;letter-spacing:.5em;color:#e6cf9c;font-weight:700;padding-left:.5em;opacity:0;transform:translateY(8px);animation:up .7s ease .5s forwards}
  .bar{width:200px;height:3px;border-radius:999px;background:rgba(255,255,255,.12);overflow:hidden;opacity:0;transform:translateY(8px);animation:up .7s ease .66s forwards}
  .bar i{display:block;height:100%;width:40%;border-radius:999px;background:var(--grad);animation:load 1.25s ease-in-out infinite}
  .t{font-size:11px;letter-spacing:.42em;color:#b3a27a;font-weight:700;padding-left:.42em;opacity:0;transform:translateY(8px);animation:up .7s ease .82s forwards}
  @keyframes pop{0%{opacity:0;transform:scale(.62) translateY(10px)}60%{opacity:1}100%{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes glow{0%,100%{opacity:.45;transform:scale(.95)}50%{opacity:.85;transform:scale(1.06)}}
  @keyframes sheen{0%{transform:translateX(-130%)}55%,100%{transform:translateX(130%)}}
  @keyframes up{to{opacity:1;transform:translateY(0)}}
  @keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
  @keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(-36px,-26px)}}
  @keyframes load{0%{transform:translateX(-120%)}100%{transform:translateX(330%)}}
  @media (prefers-reduced-motion:reduce){.ring,.halo,.aura,.logo:after{animation:none}}
</style>
</head>
<body>
  <!-- Shown only if the live store can't be reached. Capacitor's
       server.url (https://ott24x7.com/app) is what normally loads. -->
  <span class="aura a1"></span>
  <span class="aura a2"></span>
  <div class="wrap">
    <div class="badge">
      <span class="halo"></span>
      <span class="ring"></span>
      <div class="logo">OTT24<b>x7</b></div>
    </div>
    <div class="brand">PREMIUM&nbsp;OTT&nbsp;STORE</div>
    <div class="bar"><i></i></div>
    <div class="t">LOADING&nbsp;STORE</div>
  </div>
</body>
</html>
